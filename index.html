<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/599/599502.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/599/599502.png">
    <title>S&S Tracker V124</title>
    
    <link rel="manifest" href='data:application/json,{"name":"S&S Tracker","short_name":"S&S","start_url":".","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/599/599502.png","sizes":"512x512","type":"image/png"}]}'>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --mm-red: #ff3333;
            --bg: #000; --card-bg: #111; --text-dark: #fff; --text-light: #666;
            --input-bg: #1a1a1a; --input-border: #222; --color-cal: #4db8ff;
            --color-ok: #00ff88;
            --mm-font: 'Arial Black', sans-serif;
        }
        
        body { 
            font-family: var(--mm-font); 
            font-weight: 900; 
            font-style: italic; 
            background: var(--bg); 
            margin: 0; 
            padding: calc(15px + env(safe-area-inset-top)) 8px env(safe-area-inset-bottom) 8px; 
            color: var(--text-dark); 
            text-transform: uppercase; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .container { max-width: 480px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 12px; margin-bottom: 10px; border: 1px solid #222; }
        
        /* SUBTLE INTEGRATED LOGO */
        .card-logo {
            text-align: center;
            color: var(--mm-red);
            font-size: 0.9rem;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .day-box { display: flex; background: #080808; border-radius: 10px; padding: 8px; border: 1px solid #1a1a1a; }
        .day-stat { text-align: center; flex: 1; border-right: 1px solid #1a1a1a; }
        .day-stat:last-child { border: none; }
        .day-stat b { display: block; font-size: 1.1rem; }
        .day-stat span { font-size: 0.55rem; color: var(--text-light); }
        
        .progress-bar { width: 100%; height: 8px; background: #1a1a1a; border-radius: 4px; margin-top: 4px; }
        .fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

        .input-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: flex-end; }
        .input-col { flex: 1; }
        label { font-size: 0.6rem; color: var(--text-light); display: block; margin-bottom: 3px; }
        input, select { width: 100%; height: 38px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: #fff; font-family: var(--mm-font); font-style: italic; font-weight: 900; padding: 0 8px; box-sizing: border-box; font-size: 13px; text-transform: uppercase; }
        
        .qty-control { display: flex; background: #080808; border-radius: 8px; border: 1px solid var(--input-border); height: 42px; overflow: hidden; }
        .qty-btn { background: #1a1a1a; border: none; color: #fff; width: 32px; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        .qty-control input { flex: 1; border: none; background: transparent; text-align: center; padding: 0; font-size: 1.1rem; }

        .save-btn { background: var(--mm-red); color: #fff; border: none; width: 44px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .modal-btn-ok { background: var(--color-ok); color: #000; border: none; border-radius: 8px; height: 40px; font-family: var(--mm-font); font-weight: 900; cursor: pointer; flex: 1; font-size: 0.65rem; }
        .modal-btn-cancel { background: #333; color: #fff; border: none; border-radius: 8px; height: 40px; font-family: var(--mm-font); font-weight: 900; cursor: pointer; flex: 1; font-size: 0.65rem; }

        .date-unknown-box { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 50px; height: 38px; background: #080808; border-radius: 8px; border: 1px solid var(--input-border); cursor: pointer; }
        .date-unknown-box span { font-size: 0.45rem; color: var(--text-light); line-height: 1; }

        .log-item { background: #080808; border-radius: 8px; padding: 10px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #222; }
        .log-item.status-wait { border-left-color: var(--color-cal); }
        .log-item.status-open { border-left-color: var(--color-ok); }
        .log-item.status-done { opacity: 0.5; border-left-color: #333; }
        
        .log-info { flex-grow: 1; overflow: hidden; }
        .log-title { font-size: 0.8rem; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .log-data { font-size: 0.6rem; color: var(--text-light); margin-top: 1px; }
        .log-note { font-size: 0.55rem; color: var(--mm-red); margin-top: 1px; text-transform: none; font-style: normal; }

        .status-tag { font-size: 0.45rem; padding: 1px 4px; border-radius: 3px; vertical-align: middle; }
        .tag-open { background: var(--color-ok); color: #000; }
        .tag-wait { background: var(--color-cal); color: #000; }
        .tag-done { background: #333; color: #888; }

        .action-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .btn-action { height: 36px; border-radius: 8px; border: 1px solid #222; background: #080808; color: #555; font-size: 0.4rem; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--mm-font); cursor: pointer; }
        .symbol { font-family: 'Material Symbols Rounded' !important; font-size: 14px; margin-bottom: 1px; }
        
        #datePickerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 24px; border-radius: 20px; border: 1px solid #333; width: 85%; max-width: 320px; text-align: center; }

        #toast { visibility: hidden; background: #fff; color: #000; padding: 6px 12px; border-radius: 20px; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; z-index: 999; }
    </style>
</head>
<body>

<div id="datePickerModal">
    <div class="modal-content">
        <label id="modalTitle" style="margin-bottom: 20px; font-size: 0.75rem; display: block; color: var(--mm-red);">DATUM WIJZIGEN</label>
        <input type="date" id="modalDateInput" style="margin-bottom: 20px; height: 44px; font-size: 16px;">
        <div style="display:flex; gap:12px;">
            <button class="modal-btn-cancel" onclick="closeModal()">ANNULEREN</button>
            <button class="modal-btn-ok" onclick="confirmDateChange()">OK</button>
        </div>
    </div>
</div>

<div class="container">
    
    <div class="card">
        <div class="card-logo">
            <span class="symbol" style="vertical-align: middle;">monitoring</span>
            <span style="font-size: 0.6rem; letter-spacing: 1px; vertical-align: middle;">S&S</span>
        </div>
        <div class="day-box">
            <div class="day-stat"><b id="dVerz">0</b><span>VZK.</span></div>
            <div class="day-stat"><b id="dFix" style="color:var(--mm-red);">0</b><span>FIX</span></div>
            <div class="day-stat"><b id="dFlex" style="color:var(--mm-red);">0</b><span>FLX</span></div>
            <div class="day-stat"><b id="dCal" style="color:var(--color-cal);">0</b><span>BS</span></div>
        </div>
        <div style="margin-top: 10px;">
            <div style="display:flex; justify-content: space-between; align-items: center; font-size: 0.55rem; margin-bottom:2px;">
                <span>VZK TARGET (<span id="percVerz" style="color:var(--mm-red);">0%</span>)</span>
                <input type="number" id="targetVerz" style="width:45px; height:20px; background:#000; border:1px solid #222; color:#fff; text-align:center; font-size: 10px;" oninput="saveTargets()">
            </div>
            <div class="progress-bar"><div id="fillVerz" class="fill" style="background:var(--mm-red);"></div></div>
            <div style="display:flex; justify-content: space-between; align-items: center; font-size: 0.55rem; margin-top:6px; margin-bottom:2px;">
                <span>BS TARGET (<span id="percBranded" style="color:var(--color-cal);">0%</span>)</span>
                <input type="number" id="targetBranded" style="width:45px; height:20px; background:#000; border:1px solid #222; color:#fff; text-align:center; font-size: 10px;" oninput="saveTargets()">
            </div>
            <div class="progress-bar"><div id="fillBranded" class="fill" style="background:var(--color-cal);"></div></div>
        </div>
    </div>

    <div class="card">
        <form id="saleForm">
            <div class="input-row">
                <div class="input-col"><label>FACTUUR</label><input type="text" inputmode="numeric" id="invoice" placeholder="..." required></div>
                <div class="input-col"><label>NOTITIE</label><input type="text" id="notes" placeholder="..."></div>
            </div>
            <div class="input-row">
                <div class="input-col"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyFix',-1)">-</button><input type="number" id="qtyFix" placeholder="FX"><button type="button" class="qty-btn" onclick="adj('qtyFix',1)">+</button></div></div>
                <div class="input-col"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyFlex',-1)">-</button><input type="number" id="qtyFlex" placeholder="FL"><button type="button" class="qty-btn" onclick="adj('qtyFlex',1)">+</button></div></div>
                <div class="input-col"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyCal',-1)">-</button><input type="number" id="qtyCal" placeholder="BS"><button type="button" class="qty-btn" onclick="adj('qtyCal',1)">+</button></div></div>
            </div>
            <div class="input-row" style="margin-bottom:0;">
                <div style="flex: 1;"><label>DATUM</label><input type="date" id="dateInput" required></div>
                <div class="date-unknown-box" onclick="toggleDateViaBox()">
                    <span>DTM ?</span>
                    <input type="checkbox" id="dateUnknown" style="display:none" onclick="event.stopPropagation(); toggleDate(this)">
                </div>
                <button type="submit" class="save-btn"><span class="symbol">add_task</span></button>
            </div>
        </form>
    </div>

    <div class="card" style="padding: 8px;">
        <div style="display:flex; gap:4px; margin-bottom:8px;">
            <select id="viewMonth" onchange="render()" style="height:30px; font-size:0.6rem; background: #000;"></select>
            <select id="viewYear" onchange="render()" style="height:30px; font-size:0.6rem; background: #000;"></select>
        </div>
        <div id="salesLog"></div>
        <div class="action-grid">
            <div class="btn-action" onclick="shareData()"><span class="symbol">share</span>DEEL</div>
            <div class="btn-action" onclick="exportPDF()"><span class="symbol">picture_as_pdf</span>PDF</div>
            <div class="btn-action" onclick="manualExport()"><span class="symbol">table_view</span>EXCEL</div>
            <div class="btn-action" onclick="document.getElementById('importInput').click()"><span class="symbol">upload_file</span>IMP</div>
            <div class="btn-action" onclick="if(confirm('WISSEN?')) { localStorage.clear(); location.reload(); }" style="color:#222;"><span class="symbol">delete_forever</span>CLR</div>
        </div>
        <input type="file" id="importInput" style="display:none" accept=".csv,text/csv,text/plain" onchange="manualImport(event)">
    </div>
</div>

<div id="toast"></div>

<script>
    const STORAGE_KEY = 'SS_TRACKER_V124';
    let sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let activeCompleteInvoice = null;
    const months = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];

    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('install',e=>e.waitUntil(caches.open('ss-v4').then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
    }

    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }
    function showToast(m) { const x = document.getElementById("toast"); x.innerText = m; x.style.visibility = "visible"; setTimeout(() => x.style.visibility = "hidden", 2000); }
    function setToday() { document.getElementById('dateInput').valueAsDate = new Date(); }
    
    function saveTargets() { 
        localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value); 
        localStorage.setItem('ss_t_b', document.getElementById('targetBranded').value); 
        render(); 
    }
    
    function toggleDateViaBox() { 
        const cb = document.getElementById('dateUnknown'); 
        cb.checked = !cb.checked; 
        const box = document.querySelector('.date-unknown-box');
        box.style.borderColor = cb.checked ? 'var(--color-cal)' : 'var(--input-border)';
        toggleDate(cb); 
    }

    function toggleDate(cb) {
        const di = document.getElementById('dateInput');
        if(cb.checked) { di.disabled = true; di.style.opacity = "0.2"; di.required = false; }
        else { di.disabled = false; di.style.opacity = "1"; di.required = true; setToday(); }
    }

    function init() {
        const mSel = document.getElementById('viewMonth');
        const ySel = document.getElementById('viewYear');
        const now = new Date();
        months.forEach((m, i) => { mSel.innerHTML += `<option value="${i}" ${i === now.getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`; });
        for(let i = 0; i < 3; i++) {
            let y = now.getFullYear() - i;
            ySel.innerHTML += `<option value="${y}" ${i === 0 ? 'selected' : ''}>${y}</option>`;
        }
        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 20;
        document.getElementById('targetBranded').value = localStorage.getItem('ss_t_b') || 5;
        setToday(); render();
    }

    function render() {
        const log = document.getElementById('salesLog'); log.innerHTML = '';
        const selM = parseInt(document.getElementById('viewMonth').value);
        const selY = parseInt(document.getElementById('viewYear').value);
        const todayStr = new Date().toISOString().split('T')[0];
        
        let tFx=0, tFl=0, tB=0, dFx=0, dFl=0, dB=0;
        
        sales.forEach(s => {
            const fx = parseInt(s.qtyFix) || 0;
            const fl = parseInt(s.qtyFlex) || 0;
            const bs = parseInt(s.qtyCal) || 0;
            if(s.date === todayStr) { dFx+=fx; dFl+=fl; dB+=bs; }
            if(!s.isWait) { 
                const d = new Date(s.date); 
                if(d.getMonth() === selM && d.getFullYear() === selY) { tFx+=fx; tFl+=fl; tB+=bs; } 
            }
        });

        document.getElementById('dVerz').innerText = (dFx + dFl);
        document.getElementById('dFix').innerText = dFx; 
        document.getElementById('dFlex').innerText = dFl; 
        document.getElementById('dCal').innerText = dB;
        
        const totV = tFx + tFl; 
        const targetV = parseInt(document.getElementById('targetVerz').value) || 1; 
        const targetB = parseInt(document.getElementById('targetBranded').value) || 1;
        
        document.getElementById('fillVerz').style.width = Math.min((totV/targetV)*100, 100) + '%';
        document.getElementById('percVerz').innerText = Math.round((totV/targetV)*100) + '%';
        document.getElementById('fillBranded').style.width = Math.min((tB/targetB)*100, 100) + '%';
        document.getElementById('percBranded').innerText = Math.round((tB/targetB)*100) + '%';
        
        let filtered = sales.filter(s => {
            if(s.isWait) return true;
            const d = new Date(s.date); return (d.getMonth() === selM && d.getFullYear() === selY);
        });
        
        filtered.sort((a,b) => (a.isWait && !b.isWait) ? -1 : (new Date(b.date) - new Date(a.date)));
        
        filtered.forEach(s => {
            const isDone = !s.isWait && (s.date <= todayStr);
            const sC = s.isWait ? 'status-wait' : (isDone ? 'status-done' : 'status-open');
            const sT = s.isWait ? '<span class="status-tag tag-wait">WACHT</span>' : (isDone ? '<span class="status-tag tag-done">VOLTOOID</span>' : '<span class="status-tag tag-open">OPEN</span>');
            const dStr = s.isWait ? "?" : s.date.split('-').reverse().slice(0,2).join('/');
            
            log.innerHTML += `<div class="log-item ${sC}">
                <div class="log-info">
                    <div class="log-title" onclick="openDateModal('${s.invoice}', '${s.date}', ${s.isWait})">
                        ${dStr} - ${s.invoice} ${sT}
                    </div>
                    <div class="log-data">FX:${s.qtyFix} | FL:${s.qtyFlex} | BS:${s.qtyCal}</div>
                    ${(s.notes && s.notes !== "0") ? `<div class="log-note">${s.notes}</div>` : ''}
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    ${s.isWait ? `<span class="symbol" onclick="openDateModal('${s.invoice}', '', true)" style="color:var(--color-ok); cursor:pointer;">check_circle</span>` : ''}
                    <span class="symbol" onclick="removeSale('${s.invoice}')" style="cursor:pointer; color:#222; font-size:16px;">delete</span>
                </div>
            </div>`;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault();
        const wait = document.getElementById('dateUnknown').checked;
        sales.push({
            invoice: document.getElementById('invoice').value,
            notes: document.getElementById('notes').value || "",
            qtyFix: parseInt(document.getElementById('qtyFix').value) || 0,
            qtyFlex: parseInt(document.getElementById('qtyFlex').value) || 0,
            qtyCal: parseInt(document.getElementById('qtyCal').value) || 0,
            date: wait ? "2099-12-31" : document.getElementById('dateInput').value,
            isWait: wait
        });
        this.reset(); toggleDate(document.getElementById('dateUnknown')); 
        document.querySelector('.date-unknown-box').style.borderColor = 'var(--input-border)';
        render(); showToast("OK");
    };

    function removeSale(inv) { if(confirm('WISSEN?')) { sales = sales.filter(s => s.invoice !== inv); render(); } }
    function openDateModal(inv, currentDate, wasWait) { activeCompleteInvoice = inv; const modal = document.getElementById('datePickerModal'); const input = document.getElementById('modalDateInput'); const title = document.getElementById('modalTitle'); title.innerText = wasWait ? "VOLTOOI ORDER" : "DATUM WIJZIGEN"; if(currentDate && currentDate !== "2099-12-31") { input.value = currentDate; } else { input.valueAsDate = new Date(); } modal.style.display = 'flex'; }
    function closeModal() { document.getElementById('datePickerModal').style.display = 'none'; }
    function confirmDateChange() { const chosenDate = document.getElementById('modalDateInput').value; if(!chosenDate) return; const idx = sales.findIndex(s => s.invoice === activeCompleteInvoice); if(idx !== -1) { sales[idx].date = chosenDate; sales[idx].isWait = false; closeModal(); render(); showToast("VERWERKT"); } }
    function shareData() { const selM = parseInt(document.getElementById('viewMonth').value); const selY = parseInt(document.getElementById('viewYear').value); let text = `S&S RAPPORT - ${months[selM]} ${selY}\n\n`; sales.filter(s => !s.isWait && new Date(s.date).getMonth() === selM && new Date(s.date).getFullYear() === selY).forEach(s => { text += `${s.date.split('-').reverse().slice(0,2).join('/')} | INV: ${s.invoice} | FX:${s.qtyFix} FL:${s.qtyFlex} BS:${s.qtyCal}${s.notes ? ' | NOT: ' + s.notes : ''}\n`; }); if (navigator.share) { navigator.share({ title: 'S&S Report', text: text }).catch(() => copyToClipboard(text)); } else { copyToClipboard(text); } }
    function copyToClipboard(text) { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); showToast("GEKOPIEERD"); }
    function exportPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); const selM = parseInt(document.getElementById('viewMonth').value); const selY = parseInt(document.getElementById('viewYear').value); doc.setFontSize(18); doc.text(`S&S TRACKER - ${months[selM].toUpperCase()} ${selY}`, 14, 20); const data = sales.filter(s => !s.isWait && new Date(s.date).getMonth() === selM && new Date(s.date).getFullYear() === selY).map(s => [s.date.split('-').reverse().join('-'), s.invoice, s.qtyFix, s.qtyFlex, s.qtyCal, s.notes || '-']); doc.autoTable({ startY: 30, head: [['DATUM', 'FACTUUR', 'FIX', 'FLEX', 'BS', 'NOTITIE']], body: data, theme: 'grid', headStyles: { fillStyle: '#ff3333' } }); doc.save(`SS_Rapport_${months[selM]}.pdf`); showToast("PDF OK"); }
    function manualExport() { let csv = "\uFEFF"; csv += '"DATUM";"FACTUUR";"FIX";"FLEX";"BS";"NOTITIE";"STATUS"\n'; sales.forEach(s => { csv += `"${s.date}";"${s.invoice}";"${s.qtyFix}";"${s.qtyFlex}";"${s.qtyCal}";"${s.notes}";"${s.isWait?'WACHT':'OK'}"\n`; }); const b = new Blob([csv], {type:'text/csv;charset=utf-8'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `SS_BACKUP.csv`; a.click(); }
    function manualImport(event) { const file = event.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = function(e) { const lines = e.target.result.replace(/\uFEFF/g, "").split('\n'); let imp = []; for(let i = 1; i < lines.length; i++) { const c = lines[i].split(';').map(v => v.replace(/^"|"$/g, '')); if(c.length < 5) continue; imp.push({date: c[0], invoice: c[1], qtyFix: parseInt(c[2])||0, qtyFlex: parseInt(c[3])||0, qtyCal: parseInt(c[4])||0, notes: c[5] === "0" ? "" : c[5], isWait: c[6] === "WACHT"}); } sales = imp; render(); showToast("IMPORT OK"); }; reader.readAsText(file); }
    window.onload = init;
</script>
</body>
</html>
