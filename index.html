<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S&S Tracker V326-ICON-FIX</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%23ff3333%22 font-family=%22Arial%22>S</text></svg>">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --mm-red: #ff3333; --mm-orange: #ff9900;
            --bg: #000; --card-bg: #161616; --text-dark: #fff; 
            --text-gray: #999999; 
            --color-wait: #4db8ff; --color-future: #00ff88; --color-done: #444;
            --mm-font: 'Arial Black', sans-serif;
            --h-unit: 46px;
            --skew-deg: -10deg;
            --unskew-deg: 10deg;
            
            --c-mda: #ffffff; --c-sda: #ffcc00; --c-tel: #00ff66;
            --c-it: #0099ff; --c-ktv: #ff3333; --c-hifi: #cc33ff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .material-icons { font-size: 18px; display: inline-block; line-height: 1; vertical-align: middle; }
        
        body { font-family: var(--mm-font); font-weight: 900; font-style: italic; background: var(--bg); margin: 0; padding-bottom: env(safe-area-inset-bottom); color: var(--text-dark); text-transform: uppercase; overflow-x: hidden; }
        .container { padding: 0 8px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 14px 12px; margin-top: 10px; border: 1px solid #222; position: relative; }
        
        .inner-txt { transform: skewX(var(--unskew-deg)); display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 6px; font-style: italic; }

        .input-skew { height: var(--h-unit); border: 1px solid #333; background: #111; color: #fff; font-family: inherit; font-style: italic; font-weight: 900; font-size: 15px; transform: skewX(var(--skew-deg)); border-radius: 6px; outline: none; padding: 0; display: flex; overflow: hidden; align-items: center; }
        .input-skew input { background: transparent; border: none; color: #fff; font-family: inherit; font-style: inherit; font-weight: inherit; font-size: 15px; width: 100%; height: 100%; text-align: center; transform: skewX(var(--unskew-deg)); outline: none; text-transform: uppercase; }

        .dept-btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .dept-chip { height: 40px; background: #111; border: 1px solid #333; border-radius: 6px; transform: skewX(var(--skew-deg)); cursor: pointer; transition: all 0.2s; position: relative; }
        
        /* Horizontale Layout voor iconen naast tekst */
        .dept-chip .inner-chip { transform: skewX(var(--unskew-deg)); display: flex; flex-direction: row; align-items: center; justify-content: center; height: 100%; pointer-events: none; gap: 8px; }
        .dept-chip span { font-size: 11px; color: var(--text-gray); font-weight: 900; }
        
        .dept-chip.mda .material-icons { color: var(--c-mda); }
        .dept-chip.sda .material-icons { color: var(--c-sda); }
        .dept-chip.tel .material-icons { color: var(--c-tel); }
        .dept-chip.it .material-icons { color: var(--c-it); }
        .dept-chip.ktv .material-icons { color: var(--c-ktv); }
        .dept-chip.hifi .material-icons { color: var(--c-hifi); }
        .dept-chip.active { background: rgba(255,255,255,0.1); border-color: #555; }
        .dept-chip.active span { color: #fff; }

        .btn-action-slim { cursor: pointer; color: var(--text-gray); border: 1px solid #333; background: #111; transform: skewX(var(--skew-deg)); border-radius: 6px; height: var(--h-unit); display: flex; align-items: center; justify-content: center; font-family: inherit; font-style: italic; font-weight: 900; text-transform: uppercase; font-size: 13px; }
        .active-wait { background: var(--color-wait) !important; color: #000 !important; border-color: var(--color-wait) !important; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
        .progress-container { grid-column: span 3; }
        .progress-bar-wrapper { height: 42px; background: #0a0a0a; border-radius: 6px; overflow: hidden; border: 1px solid #222; position: relative; display: flex; align-items: center; transform: skewX(var(--skew-deg)); }
        .fill-segment { height: 100%; transition: width 0.8s ease; position: absolute; top: 0; }
        #fillFix { background: linear-gradient(90deg, #660000, var(--mm-red)); z-index: 2; }
        #fillFlexSegment { background: linear-gradient(90deg, #663300, var(--mm-orange)); z-index: 1; }
        #fillBranded { background: linear-gradient(90deg, #004466, var(--color-wait)); }
        
        .bar-label-left, .bar-label-right { position: absolute; z-index: 5; font-size: 12px; color: #fff; transform: skewX(var(--unskew-deg)); pointer-events: none; font-style: italic; }
        .bar-label-left { left: 12px; } .bar-label-right { right: 12px; }

        .qty-control-skew { display: grid; grid-template-columns: 35px 1fr 35px; background: #111; border: 1px solid #333; height: var(--h-unit); transform: skewX(var(--skew-deg)); border-radius: 6px; overflow: hidden; }
        .qty-btn-skew { background: #222; border: none; cursor: pointer; font-weight: 900; font-size: 22px; transform: skewX(var(--unskew-deg)); font-style: italic; }
        .qty-input-skew { background: transparent; border: none; text-align: center; font-family: inherit; font-weight: 900; font-size: 16px; transform: skewX(var(--unskew-deg)); width: 100%; outline: none; font-style: italic; }
        
        #salesLog { flex: 1; overflow-y: auto; margin: 8px 0; max-height: 500px; }
        .date-header { background: #222; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; color: #eee; margin-bottom: 6px; transform: skewX(var(--skew-deg)); border: 1px solid #333; }
        .date-header-inner { transform: skewX(var(--unskew-deg)); display: flex; align-items: center; width: 100%; justify-content: space-between; }
        
        .date-content { display: none; }
        .date-content.open { display: block; }

        .log-item { background: #0c0c0c; border-radius: 12px; padding: 14px 10px; margin-bottom: 10px; border: 1px solid #222; position: relative; overflow: hidden; }
        .log-main-grid { display: grid; grid-template-columns: 1fr 130px 45px; align-items: center; gap: 12px; }
        .status-bar-left { position: absolute; top: 0; bottom: 0; width: 4px; left: 0; }

        .log-qty-cols { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; background: #000; border-radius: 8px; padding: 4px 2px; border: 1px solid #1a1a1a; transform: skewX(var(--skew-deg)); }
        .qty-col { display: flex; flex-direction: column; transform: skewX(var(--unskew-deg)); }
        .qty-col-label { font-size: 6px; color: #555; font-style: italic; line-height: 1; margin-bottom: 1px; }
        .qty-col-val { font-size: 14px; font-weight: 900; font-style: italic; line-height: 1.1; }
        
        .grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; margin-bottom: 10px; }
        .col-3 { grid-column: span 3; } .col-4 { grid-column: span 4; } .col-5 { grid-column: span 5; } .col-7 { grid-column: span 7; }
        .invoice-tap { cursor: pointer; font-style: italic; color: #fff; font-size: 18px; }
        .dept-tag { font-size: 8px; color: var(--text-gray); border: 1px solid #333; padding: 1px 4px; border-radius: 3px; vertical-align: middle; margin-left: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header" style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px;">
            <div style="background: #000; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px solid #333;"><span style="color: var(--mm-red); font-size: 22px; font-weight: 900;">S</span></div>
            <div style="font-size: 18px; letter-spacing: 0.5px; color: #fff; font-style: italic;">SALES & SOLUTIONS</div>
        </div>
        
        <div class="stats-grid">
            <div class="progress-container">
                <div class="progress-bar-wrapper">
                    <div class="bar-label-left">INSURANCE</div>
                    <div class="bar-label-right">FIX:<b id="valFix">0</b> FLX:<b id="valFlex">0</b> | <span id="percVerz">0%</span></div>
                    <div id="fillFix" class="fill-segment" style="width:0%;"></div>
                    <div id="fillFlexSegment" class="fill-segment" style="width:0%;"></div>
                </div>
            </div>
            <div style="grid-column: span 1;"><div class="input-skew" style="background: #0a0a0a;"><input type="number" id="targetVerz" oninput="saveTargets()" placeholder="TGT"></div></div>
        </div>

        <div class="stats-grid">
            <div class="progress-container">
                <div class="progress-bar-wrapper">
                    <div class="bar-label-left">CALIBRATION</div>
                    <div class="bar-label-right">CAL:<b id="valCal">0</b> | <span id="percBranded">0%</span></div>
                    <div id="fillBranded" class="fill-segment" style="width:0%;"></div>
                </div>
            </div>
            <div style="grid-column: span 1;"><div class="input-skew" style="background: #0a0a0a;"><input type="number" id="targetVerzCalibration" oninput="saveTargets()" placeholder="TGT"></div></div>
        </div>

        <div class="grid-12" style="margin-top:10px;">
            <div class="btn-action-slim col-3" onclick="shareAsPDF()"><div class="inner-txt"><span class="material-icons" style="color:#fff">share</span>SHARE</div></div>
            <div class="btn-action-slim col-3" onclick="manualExport()"><div class="inner-txt"><span class="material-icons" style="color:var(--mm-orange)">file_download</span>EXP</div></div>
            <div class="btn-action-slim col-3" onclick="document.getElementById('importInput').click()"><div class="inner-txt"><span class="material-icons" style="color:var(--color-future)">file_upload</span>IMP</div></div>
            <div class="btn-action-slim col-3" onclick="if(confirm('CLEAR ALL?')){localStorage.clear();location.reload();}"><div class="inner-txt"><span class="material-icons" style="color:var(--mm-red)">delete_sweep</span>CLR</div></div>
        </div>
        <input type="file" id="importInput" style="display:none" accept=".csv" onchange="manualImport(event)">
    </div>

    <div class="card">
        <form id="saleForm">
            <div class="dept-btn-row" id="deptSelector">
                <div class="dept-chip mda" onclick="toggleDept(this, 'MDA')"><div class="inner-chip"><span class="material-icons">local_laundry_service</span><span>MDA</span></div></div>
                <div class="dept-chip sda" onclick="toggleDept(this, 'SDA')"><div class="inner-chip"><span class="material-icons">cleaning_services</span><span>SDA</span></div></div>
                <div class="dept-chip tel" onclick="toggleDept(this, 'TELCO')"><div class="inner-chip"><span class="material-icons">smartphone</span><span>TEL</span></div></div>
                <div class="dept-chip it" onclick="toggleDept(this, 'IT')"><div class="inner-chip"><span class="material-icons">laptop</span><span>IT</span></div></div>
                <div class="dept-chip ktv" onclick="toggleDept(this, 'KTV')"><div class="inner-chip"><span class="material-icons">tv</span><span>KTV</span></div></div>
                <div class="dept-chip hifi" onclick="toggleDept(this, 'HIFI')"><div class="inner-chip"><span class="material-icons">speaker</span><span>HIFI</span></div></div>
            </div>
            
            <div class="grid-12">
                <div class="input-skew col-5"><input type="text" id="invoice" inputmode="numeric" placeholder="INV #" required style="text-align:left; padding-left:15px;"></div>
                <div class="input-skew col-7"><input type="text" id="notes" placeholder="NOTE..." style="text-align:left; padding-left:10px;"></div>
            </div>
            <div class="grid-12">
                <div class="qty-control-skew col-4">
                    <button type="button" class="qty-btn-skew" onclick="adj('qtyFix',-1)" style="color:var(--mm-red)">-</button>
                    <input type="number" id="qtyFix" class="qty-input-skew" placeholder="FIX" style="color:var(--mm-red)">
                    <button type="button" class="qty-btn-skew" onclick="adj('qtyFix',1)" style="color:var(--mm-red)">+</button>
                </div>
                <div class="qty-control-skew col-4">
                    <button type="button" class="qty-btn-skew" onclick="adj('qtyFlex',-1)" style="color:var(--mm-orange)">-</button>
                    <input type="number" id="qtyFlex" class="qty-input-skew" placeholder="FLX" style="color:var(--mm-orange)">
                    <button type="button" class="qty-btn-skew" onclick="adj('qtyFlex',1)" style="color:var(--mm-orange)">+</button>
                </div>
                <div class="qty-control-skew col-4">
                    <button type="button" class="qty-btn-skew" onclick="adj('qtyCal',-1)" style="color:var(--color-wait)">-</button>
                    <input type="number" id="qtyCal" class="qty-input-skew" placeholder="CAL" style="color:var(--color-wait)">
                    <button type="button" class="qty-btn-skew" onclick="adj('qtyCal',1)" style="color:var(--color-wait)">+</button>
                </div>
            </div>
            <div class="grid-12">
                <div class="input-skew col-4">
                    <div class="inner-txt" style="justify-content: flex-start; padding-left: 10px;">
                        <span class="material-icons" style="color:var(--text-gray); font-size: 18px;">event</span>
                        <input type="date" id="dateInput" required style="color:var(--text-gray); font-size:12px; flex: 1;">
                    </div>
                </div>
                <div id="waitBtn" class="btn-action-slim col-4" onclick="toggleDateViaBox()"><div class="inner-txt"><span class="material-icons" style="color:var(--color-wait);">hourglass_empty</span>WAIT</div><input type="checkbox" id="dateUnknown" style="display:none" onchange="toggleDate(this)"></div>
                <button type="submit" id="mainSubmitBtn" class="btn-action-slim col-4"><div class="inner-txt"><span class="material-icons" style="color:var(--color-future);">content_paste_go</span><span id="btnText" style="color:var(--text-gray);">SAVE</span></div></button>
            </div>
        </form>
    </div>

    <div class="card" style="flex:1; display:flex; flex-direction:column;">
        <div class="grid-12" style="margin-bottom:12px; gap:6px;">
            <div class="input-skew" style="grid-column: span 4;"><input type="text" id="searchInput" placeholder="SEARCH..." oninput="render()" style="text-align:left; padding-left:15px;"></div>
            <div class="input-skew" style="grid-column: span 4;"><select id="viewMonth" onchange="render()" style="background:transparent; border:none; color:var(--text-gray); width:100%; height:100%; font-family:inherit; font-style:italic; font-weight:900; text-align:center; outline:none;"></select></div>
            <div class="input-skew" style="grid-column: span 3;"><select id="viewYear" onchange="render()" style="background:transparent; border:none; color:var(--text-gray); width:100%; height:100%; font-family:inherit; font-style:italic; font-weight:900; text-align:center; outline:none;"></select></div>
            <div id="eyeBtn" class="btn-action-slim" style="grid-column: span 1;" onclick="toggleRunningFilter()"><div class="inner-txt"><span id="eyeIcon" class="material-icons" style="font-size:24px;">visibility_off</span></div></div>
        </div>
        <div id="salesLog"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SS_DATA_MASTER';
    const DEPT_COLORS = { 'MDA': [255,255,255], 'SDA': [255,204,0], 'TELCO': [0,255,102], 'IT': [0,153,255], 'KTV': [255,51,51], 'HIFI': [204,51,255] };
    let sales = [];
    let selectedDepts = [];
    let editId = null;
    let showOnlyOpen = false;
    let collapsedDates = {}; 
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function toggleDept(el, dept) {
        if (selectedDepts.includes(dept)) { selectedDepts = selectedDepts.filter(d => d !== dept); el.classList.remove('active'); } 
        else { selectedDepts.push(dept); el.classList.add('active'); }
    }
    function resetDepts() { selectedDepts = []; document.querySelectorAll('.dept-chip').forEach(c => c.classList.remove('active')); }
    function getLocalDate() { return new Date().toISOString().split('T')[0]; }
    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }
    function toggleDateViaBox() { const cb = document.getElementById('dateUnknown'); cb.checked = !cb.checked; toggleDate(cb); }
    function toggleDate(cb) {
        const di = document.getElementById('dateInput'), btn = document.getElementById('waitBtn'), container = di.closest('.input-skew');
        if(cb.checked) { btn.classList.add('active-wait'); di.disabled = true; container.style.opacity = "0.2"; } 
        else { btn.classList.remove('active-wait'); di.disabled = false; container.style.opacity = "1"; }
    }
    function toggleRunningFilter() { showOnlyOpen = !showOnlyOpen; document.getElementById('eyeIcon').innerText = showOnlyOpen ? 'visibility' : 'visibility_off'; render(); }
    
    function toggleGroup(date) { 
        collapsedDates[date] = !collapsedDates[date]; 
        render(); 
    }

    function loadData() { sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }

    function render() {
        const log = document.getElementById('salesLog'), selM = parseInt(document.getElementById('viewMonth').value), selY = parseInt(document.getElementById('viewYear').value), search = document.getElementById('searchInput').value.toLowerCase();
        const today = getLocalDate();
        let mFx=0, mFl=0, mB=0; log.innerHTML = '';
        
        sales.forEach(s => { if(!s.isWait && s.date !== "2099-12-31") { const d = new Date(s.date); if(d.getMonth() === selM && d.getFullYear() === selY) { mFx += parseInt(s.qtyFix)||0; mFl += parseInt(s.qtyFlex)||0; mB += parseInt(s.qtyCal)||0; } } });
        const tV = parseInt(document.getElementById('targetVerz').value) || 1, tB = parseInt(document.getElementById('targetVerzCalibration').value) || 1;
        document.getElementById('valFix').innerText = mFx; document.getElementById('valFlex').innerText = mFl; document.getElementById('valCal').innerText = mB;
        const fixW = Math.min((mFx/tV)*100, 100); document.getElementById('fillFix').style.width = fixW + '%';
        const flxW = (mFl/tV)*100; document.getElementById('fillFlexSegment').style.width = Math.min(flxW, 100 - fixW) + '%'; 
        document.getElementById('fillFlexSegment').style.left = fixW + '%'; document.getElementById('fillBranded').style.width = Math.min((mB/tB)*100, 100) + '%';
        document.getElementById('percVerz').innerText = Math.round(((mFx+mFl)/tV)*100) + '%'; document.getElementById('percBranded').innerText = Math.round((mB/tB)*100) + '%';
        
        const groups = {};
        sales.sort((a,b) => b.date.localeCompare(a.date)).forEach(s => {
            const isWait = s.isWait || s.date === "2099-12-31"; const sD = new Date(s.date); 
            const isInPeriod = isWait || (sD.getMonth() === selM && sD.getFullYear() === selY);
            if (!isInPeriod || (showOnlyOpen && !isWait && s.date <= today) || (search && !s.invoice.toLowerCase().includes(search))) return;
            if (!groups[s.date]) groups[s.date] = []; groups[s.date].push(s);
        });

        Object.keys(groups).forEach((dateKey, index) => {
            const headerLabel = dateKey === "2099-12-31" ? "WACHTLIJST" : `${dateKey.split('-')[2]} ${months[parseInt(dateKey.split('-')[1])-1]}`;
            let dayFix = 0, dayFlex = 0, dayCal = 0; groups[dateKey].forEach(s => { dayFix += (parseInt(s.qtyFix) || 0); dayFlex += (parseInt(s.qtyFlex) || 0); dayCal += (parseInt(s.qtyCal) || 0); });
            const isCollapsed = collapsedDates[dateKey] === undefined ? (index !== 0 && !search) : collapsedDates[dateKey];
            
            let groupHTML = `<div class="date-group">
                <div class="date-header" onclick="toggleGroup('${dateKey}')">
                    <div class="date-header-inner">
                        <div style="flex: 1;">${headerLabel}</div>
                        <div class="summary-box">
                            <div class="log-qty-cols">
                                <div class="qty-col"><span class="qty-col-label">FIX</span><span class="qty-col-val" style="color:var(--mm-red)">${dayFix}</span></div>
                                <div class="qty-col"><span class="qty-col-label">FLX</span><span class="qty-col-val" style="color:var(--mm-orange)">${dayFlex}</span></div>
                                <div class="qty-col"><span class="qty-col-label">CAL</span><span class="qty-col-val" style="color:var(--color-wait)">${dayCal}</span></div>
                            </div>
                        </div>
                        <span class="material-icons" style="margin-left:10px;">${isCollapsed ? 'expand_more' : 'expand_less'}</span>
                    </div>
                </div>
                <div class="date-content ${!isCollapsed ? 'open' : ''}">`;

            groups[dateKey].forEach(s => {
                const statusColor = s.isWait || s.date === "2099-12-31" ? 'var(--color-wait)' : (s.date > today ? 'var(--color-future)' : 'var(--color-done)');
                groupHTML += `<div class="log-item">
                    <div class="status-bar-left" style="background:${statusColor}"></div>
                    <div class="log-main-grid">
                        <div>
                            <div class="invoice-tap">${s.invoice}<span class="dept-tag">${s.dept.join(', ')}</span></div>
                            <div style="font-size:12px; color:var(--mm-orange);">${s.notes || '-'}</div>
                        </div>
                        <div class="log-qty-cols">
                            <div class="qty-col"><span class="qty-col-label">FIX</span><span class="qty-col-val" style="color:var(--mm-red)">${s.qtyFix}</span></div>
                            <div class="qty-col"><span class="qty-col-label">FLX</span><span class="qty-col-val" style="color:var(--mm-orange)">${s.qtyFlex}</span></div>
                            <div class="qty-col"><span class="qty-col-label">CAL</span><span class="qty-col-val" style="color:var(--color-wait)">${s.qtyCal}</span></div>
                        </div>
                        <div style="text-align:right;">
                            <span class="material-icons" style="color:#eee; margin-right:8px;" onclick="startEdit(${s.id})">edit</span>
                            <span class="material-icons" style="color:#444;" onclick="confirmDelete(${s.id})">delete</span>
                        </div>
                    </div>
                </div>`;
            }); 
            log.innerHTML += groupHTML + `</div></div>`;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault(); const wait = document.getElementById('dateUnknown').checked;
        const data = { invoice: document.getElementById('invoice').value, dept: selectedDepts.length > 0 ? [...selectedDepts] : ['MDA'], notes: document.getElementById('notes').value, qtyFix: parseInt(document.getElementById('qtyFix').value)||0, qtyFlex: parseInt(document.getElementById('qtyFlex').value)||0, qtyCal: parseInt(document.getElementById('qtyCal').value)||0, date: wait ? "2099-12-31" : document.getElementById('dateInput').value, isWait: wait };
        if(editId) { sales[sales.findIndex(x => x.id === editId)] = { id: editId, ...data }; editId = null; document.getElementById('btnText').innerText = 'SAVE'; } 
        else { sales.push({ id: Date.now(), ...data }); }
        this.reset(); resetDepts(); document.getElementById('dateInput').value = getLocalDate(); toggleDate(document.getElementById('dateUnknown')); render();
    };

    function startEdit(id) {
        const s = sales.find(x => x.id === id); if(!s) return; editId = id; 
        document.getElementById('invoice').value = s.invoice; document.getElementById('notes').value = s.notes || '';
        document.getElementById('qtyFix').value = s.qtyFix; document.getElementById('qtyFlex').value = s.qtyFlex; document.getElementById('qtyCal').value = s.qtyCal;
        document.getElementById('dateInput').value = s.isWait ? getLocalDate() : s.date; document.getElementById('dateUnknown').checked = s.isWait;
        resetDepts(); s.dept.forEach(d => { let cls = d.toLowerCase(); if(cls === 'telco') cls = 'tel'; const chip = document.querySelector(`.dept-chip.${cls}`); if(chip) toggleDept(chip, d); });
        toggleDate(document.getElementById('dateUnknown')); document.getElementById('btnText').innerText = 'UPDATE';
    }

    function manualExport() {
        const csv = sales.map(s => [s.id, s.date, s.invoice, `"${s.dept.join('|')}"`, s.qtyFix, s.qtyFlex, s.qtyCal, `"${s.notes}"`].join(","));
        const blob = new Blob([csv.join("\n")], {type: 'text/csv'});
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'SS_Backup.csv'; a.click();
    }

    function manualImport(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader(); reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            sales = lines.map(line => {
                const c = line.split(','); if(c.length < 7) return null;
                return { id: parseInt(c[0]), date: c[1], invoice: c[2], dept: c[3].replace(/"/g,'').split('|'), qtyFix: parseInt(c[4]), qtyFlex: parseInt(c[5]), qtyCal: parseInt(c[6]), notes: c[7]?.replace(/"/g,'') || '' };
            }).filter(x => x); render();
        }; reader.readAsText(file);
    }
    function saveTargets() { localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value); localStorage.setItem('ss_t_b_c', document.getElementById('targetVerzCalibration').value); render(); }
    function confirmDelete(id) { if(confirm('DELETE?')) { sales = sales.filter(x => x.id !== id); render(); } }

    window.onload = function() {
        loadData(); const mS = document.getElementById('viewMonth'), yS = document.getElementById('viewYear'), n = new Date();
        months.forEach((m, i) => mS.innerHTML += `<option value="${i}" ${i === n.getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`);
        [n.getFullYear(), n.getFullYear()-1].forEach(y => yS.innerHTML += `<option value="${y}">${y}</option>`);
        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 40; document.getElementById('targetVerzCalibration').value = localStorage.getItem('ss_t_b_c') || 10;
        document.getElementById('dateInput').value = getLocalDate(); render();
    };

    async function shareAsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selM = parseInt(document.getElementById('viewMonth').value);
        const selY = parseInt(document.getElementById('viewYear').value);
        const monthName = months[selM];
        
        const filtered = sales.filter(s => {
            if (s.isWait || s.date === "2099-12-31") return false;
            const d = new Date(s.date); return d.getMonth() === selM && d.getFullYear() === selY;
        }).sort((a,b) => a.date.localeCompare(b.date));

        doc.setFillColor(22, 22, 22); doc.rect(0, 0, 210, 297, 'F');
        doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(255, 51, 51); doc.text("SALES REPORT", 15, 25);
        doc.setFontSize(14); doc.setTextColor(255, 255, 255); doc.text(`${monthName.toUpperCase()} ${selY}`, 15, 35);
        
        let tFix = 0, tFlex = 0, tCal = 0;
        const deptStats = {};

        const rows = filtered.map(s => {
            const f = parseInt(s.qtyFix) || 0, fl = parseInt(s.qtyFlex) || 0, c = parseInt(s.qtyCal) || 0;
            tFix += f; tFlex += fl; tCal += c;
            s.dept.forEach(d => {
                if(!deptStats[d]) deptStats[d] = { fix: 0, flex: 0, cal: 0 };
                deptStats[d].fix += f; deptStats[d].flex += fl; deptStats[d].cal += c;
            });
            return [s.date, s.invoice, s.dept.join(','), f, fl, c];
        });

        doc.autoTable({
            startY: 45, head: [['DATE', 'INV', 'DEPT', 'FIX', 'FLX', 'CAL']], body: rows, theme: 'grid',
            headStyles: { fillColor: [0, 0, 0], textColor: [255, 51, 51], fontStyle: 'bold', lineWidth: 0.1, lineColor: [44,44,44] },
            bodyStyles: { fillColor: [30, 30, 30], textColor: [255, 255, 255], lineColor: [44,44,44] },
            columnStyles: { 3: { textColor: [255, 51, 51] }, 4: { textColor: [255, 153, 0] }, 5: { textColor: [77, 184, 255] } },
            alternateRowStyles: { fillColor: [25, 25, 25] }, margin: { left: 15, right: 15 }
        });

        let currentY = doc.lastAutoTable.finalY + 15;
        if (currentY > 230) { doc.addPage(); currentY = 25; doc.setFillColor(22, 22, 22); doc.rect(0, 0, 210, 297, 'F'); }

        const deptRows = Object.keys(deptStats).map(d => [d, deptStats[d].fix, deptStats[d].flex, deptStats[d].cal, (deptStats[d].fix + deptStats[d].flex + deptStats[d].cal)]);
        doc.setFontSize(16); doc.setTextColor(255, 255, 255); doc.text("DEPARTMENT BREAKDOWN", 15, currentY);

        doc.autoTable({
            startY: currentY + 5, head: [['DEPARTMENT', 'FIX', 'FLX', 'CAL', 'TOTAL']], body: deptRows, theme: 'grid',
            headStyles: { fillColor: [0, 0, 0], textColor: [255, 255, 255] },
            bodyStyles: { fillColor: [30, 30, 30], textColor: [255, 255, 255] },
            didParseCell: function(data) {
                if (data.section === 'body' && data.column.index === 0) {
                    const dName = data.cell.raw; if(DEPT_COLORS[dName]) data.cell.styles.textColor = DEPT_COLORS[dName];
                }
            }, margin: { left: 15, right: 15 }
        });

        let finalY = doc.lastAutoTable.finalY + 15;
        if (finalY > 260) { doc.addPage(); finalY = 25; doc.setFillColor(22, 22, 22); doc.rect(0, 0, 210, 297, 'F'); }

        doc.setFontSize(16); doc.setTextColor(255, 255, 255); doc.text("GRAND TOTALS", 15, finalY);
        doc.setFontSize(12);
        doc.setTextColor(255, 51, 51); doc.text(`FIX: ${tFix}`, 15, finalY + 10);
        doc.setTextColor(255, 153, 0); doc.text(`FLX: ${tFlex}`, 45, finalY + 10);
        doc.setTextColor(77, 184, 255); doc.text(`CAL: ${tCal}`, 75, finalY + 10);
        doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.text(`TOTAL SERVICES: ${tFix + tFlex + tCal}`, 15, finalY + 20);

        const pdfOutput = doc.output('blob');
        const filename = `SS_Report_${monthName}_${selY}.pdf`;
        const file = new File([pdfOutput], filename, { type: 'application/pdf' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: 'S&S Tracker Report', text: `Rapport ${monthName} ${selY}` }); } 
            catch (err) { doc.save(filename); }
        } else { doc.save(filename); }
    }
</script>
