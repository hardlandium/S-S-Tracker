<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>S&S Tracker V242-MOD</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%23ff3333%22 font-family=%22Arial%22>S</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --mm-red: #ff3333; --mm-orange: #ff8800;
            --bg: #000; --card-bg: #161616; --text-dark: #fff; --text-gray: #999;
            --color-wait: #4db8ff; --color-future: #00ff88; --mm-font: 'Arial Black', sans-serif;
            --h-unit: 36px;
        }
        
        .symbol { font-family: 'Material Symbols Rounded'; font-weight: normal; font-size: 24px; display: inline-block; line-height: 1; font-style: normal; }
        body { font-family: var(--mm-font); font-weight: 900; font-style: italic; background: var(--bg); margin: 0; padding-bottom: env(safe-area-inset-bottom); color: var(--text-dark); text-transform: uppercase; overflow-x: hidden; }
        .container { padding: 0 8px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 12px; margin-top: 10px; border: 1px solid #222; position: relative; }
        
        .subtle-header { 
            font-size: 13px; letter-spacing: 1.2px; color: var(--text-gray); 
            margin-bottom: 12px; text-align: center; 
            max-width: 300px; margin-left: auto; margin-right: auto;
        }
        .subtle-header span { color: var(--mm-red); }

        input, select, .btn-action-slim, .target-input-slim { 
            height: var(--h-unit); border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; 
            font-family: inherit; font-style: italic; font-weight: 900; padding: 0 10px; box-sizing: border-box; 
            font-size: 10px; transition: all 0.2s; appearance: none; display: flex; align-items: center; text-transform: uppercase;
        }
        
        input { text-align: center; }
        input::placeholder { color: #444; }
        input[type="date"] { color: var(--text-gray); color-scheme: dark; }

        /* GEFORCEERDE PLACEHOLDER KLEUREN */
        #qtyFix::placeholder { color: rgba(255, 51, 51, 0.7) !important; opacity: 1; }
        #qtyFlex::placeholder { color: rgba(255, 136, 0, 0.7) !important; opacity: 1; }
        #qtyCal::placeholder { color: rgba(77, 184, 255, 0.7) !important; opacity: 1; }

        .progress-container { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .progress-bar-wrapper { flex: 1; height: 32px; background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; position: relative; display: flex; align-items: center; }
        .fill { height: 100%; transition: width 0.6s ease; position: absolute; left: 0; top: 0; z-index: 1; }
        .bar-label-left { position: absolute; left: 10px; z-index: 2; font-size: 9px; color: #fff; text-shadow: 1px 1px 2px #000; pointer-events: none; }
        .bar-label-right { position: absolute; right: 10px; z-index: 2; font-size: 9px; color: #fff; text-shadow: 1px 1px 2px #000; pointer-events: none; }
        .target-input-slim { width: 60px; height: 32px; font-size: 11px; padding: 0; color: var(--text-gray); }

        .qty-control { display: grid; grid-template-columns: 32px 1fr 32px; background: #111; border-radius: 8px; border: 1px solid #333; height: var(--h-unit); overflow: hidden; }
        .qty-btn { background: #222; border: none; color: var(--text-gray); cursor: pointer; font-weight: 900; font-size: 18px; display: flex; align-items: center; justify-content: center; font-family: inherit; }
        .qty-control input { width: 100%; border: none; background: transparent; text-align: center; padding: 0; font-size: 12px; height: 100%; font-family: inherit; font-weight: 900; }
        
        #qtyFix { color: var(--mm-red) !important; }
        #qtyFlex { color: var(--mm-orange) !important; }
        #qtyCal { color: var(--color-wait) !important; }

        .btn-action-slim { cursor: pointer; gap: 6px; color: var(--text-gray); width: 100%; justify-content: center; border: 1px solid #333; }
        .btn-action-slim.active-wait, .btn-action-slim.active-eye { color: var(--color-wait); border-color: var(--color-wait); }
        .btn-action-slim.submit-style { background: #222; border-color: #444; color: #fff; }

        .list-card { display: flex; flex-direction: column; flex: 1; max-height: 540px; margin-bottom: 15px; }
        #salesLog { flex: 1; overflow-y: auto; margin: 8px 0; }
        .list-header-row { display: grid; grid-template-columns: 1fr 65px 65px 40px; gap: 6px; margin-bottom: 12px; align-items: center; }
        
        .search-wrapper { position: relative; width: 100%; height: var(--h-unit); }
        .search-wrapper .symbol { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-gray); z-index: 2; pointer-events: none; }
        #searchInput { padding-left: 28px; text-align: left; width: 100%; }

        .log-item { background: #0c0c0c; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #222; border-left: 5px solid #333; border-right: 5px solid #333; }
        .log-item.status-wait { border-left-color: var(--color-wait); border-right-color: var(--color-wait); } 
        .log-item.status-future { border-left-color: var(--color-future); border-right-color: var(--color-future); }
        
        .log-grid { display: grid; grid-template-columns: 50px 1fr 85px 50px; align-items: center; gap: 8px; }
        .log-date { font-size: 10px; color: var(--text-gray); text-align: center; }
        .log-invoice { font-size: 12px; color: #fff; font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .qty-pill { background: #000; padding: 5px; border-radius: 6px; border: 1px solid #222; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; text-align: center; font-size: 11px; }
        .qty-val-fix { color: var(--mm-red); }
        .qty-val-flex { color: var(--mm-orange); }
        .qty-val-cal { color: var(--color-wait); }

        .note-text { color: var(--mm-orange); font-size: 10px; margin-top: 6px; padding-left: 58px; border-top: 1px solid #1a1a1a; padding-top: 4px; text-align: left; opacity: 0.8; }
        
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 25px; font-size: 11px; z-index: 2000; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast">MELDING</div>

<div class="container">
    <div class="card">
        <div class="subtle-header">SERVICES & SOLUTIONS <span>TRACKER</span></div>
        <div class="progress-container">
            <div class="progress-bar-wrapper">
                <div class="bar-label-left">TARGET INSURANCE</div>
                <div class="bar-label-right">FIX:<b id="valFix">0</b> | FLX:<b id="valFlex">0</b> | <span id="percVerz">0%</span></div>
                <div id="fillVerz" class="fill" style="background:var(--mm-red); width:0%;"></div>
            </div>
            <input type="number" id="targetVerz" class="target-input-slim" oninput="saveTargets()">
        </div>
        <div class="progress-container">
            <div class="progress-bar-wrapper">
                <div class="bar-label-left">TARGET CALIBRATION</div>
                <div class="bar-label-right">CAL:<b id="valCal">0</b> | <span id="percBranded">0%</span></div>
                <div id="fillBranded" class="fill" style="background:var(--color-wait); width:0%;"></div>
            </div>
            <input type="number" id="targetBranded" class="target-input-slim" oninput="saveTargets()">
        </div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; margin-top:10px;">
            <div class="btn-action-slim" onclick="shareAsPDF()"><span class="symbol" style="font-size:16px;">share</span>DEEL</div>
            <div class="btn-action-slim" onclick="manualExport()"><span class="symbol" style="font-size:16px;">output</span>EXP</div>
            <div class="btn-action-slim" onclick="document.getElementById('importInput').click()"><span class="symbol" style="font-size:16px;">input</span>IMP</div>
            <div class="btn-action-slim" onclick="if(confirm('WISSEN?')){localStorage.clear();location.reload();}"><span class="symbol" style="font-size:16px;">delete</span>CLR</div>
        </div>
        <input type="file" id="importInput" style="display:none" accept=".json" onchange="manualImport(event)">
    </div>

    <div class="card">
        <form id="saleForm">
            <div style="display:flex; gap:6px; margin-bottom:8px;">
                <input type="text" id="invoice" inputmode="numeric" placeholder="FACTUUR #" required style="flex:1;">
                <input type="text" id="notes" placeholder="NOTITIE..." style="flex:1;">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:6px; margin-bottom:8px;">
                <div class="qty-control">
                    <button type="button" class="qty-btn" onclick="adj('qtyFix',-1)">-</button>
                    <input type="number" id="qtyFix" placeholder="FIX">
                    <button type="button" class="qty-btn" onclick="adj('qtyFix',1)">+</button>
                </div>
                <div class="qty-control">
                    <button type="button" class="qty-btn" onclick="adj('qtyFlex',-1)">-</button>
                    <input type="number" id="qtyFlex" placeholder="FLX">
                    <button type="button" class="qty-btn" onclick="adj('qtyFlex',1)">+</button>
                </div>
                <div class="qty-control">
                    <button type="button" class="qty-btn" onclick="adj('qtyCal',-1)">-</button>
                    <input type="number" id="qtyCal" placeholder="CAL">
                    <button type="button" class="qty-btn" onclick="adj('qtyCal',1)">+</button>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:6px;">
                <input type="date" id="dateInput" required>
                <div id="waitBtn" class="btn-action-slim" onclick="toggleDateViaBox()">
                    <span id="waitIcon" class="symbol" style="font-size:16px;">hourglass_empty</span>WACHT
                    <input type="checkbox" id="dateUnknown" style="display:none" onchange="toggleDate(this)">
                </div>
                <button type="submit" id="mainSubmitBtn" class="btn-action-slim submit-style">
                    <span id="submitIcon" class="symbol" style="font-size:16px;">add_task</span>OPSLAAN
                </button>
            </div>
        </form>
    </div>

    <div class="card list-card">
        <div class="list-header-row">
            <div class="search-wrapper">
                <span class="symbol">search</span>
                <input type="text" id="searchInput" placeholder="ZOEK..." oninput="render()">
            </div>
            <select id="viewMonth" class="btn-action-slim" onchange="render()"></select>
            <select id="viewYear" class="btn-action-slim" onchange="render()"></select>
            <div id="eyeBtn" class="btn-action-slim" onclick="toggleRunningFilter()">
                <span id="eyeIcon" class="symbol" style="font-size:18px;">visibility_off</span>
            </div>
        </div>
        <div id="salesLog"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SS_DATA_V184';
    let sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editId = null;
    let showOnlyRunning = false;
    const months = ["Jan", "Feb", "Mrt", "Apr", "Mei", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dec"];

    function getLocalDate() { return new Date().toISOString().split('T')[0]; }
    function showToast(text) { const t = document.getElementById('toast'); t.innerText = text; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }

    function toggleDateViaBox() { const cb = document.getElementById('dateUnknown'); cb.checked = !cb.checked; toggleDate(cb); }
    function toggleDate(cb) {
        const di = document.getElementById('dateInput'), btn = document.getElementById('waitBtn'), icon = document.getElementById('waitIcon');
        if(cb.checked) { btn.classList.add('active-wait'); icon.innerText = "hourglass_full"; di.disabled = true; di.style.opacity = "0.2"; } 
        else { btn.classList.remove('active-wait'); icon.innerText = "hourglass_empty"; di.disabled = false; di.style.opacity = "1"; }
    }

    function toggleRunningFilter() {
        showOnlyRunning = !showOnlyRunning;
        document.getElementById('eyeBtn').classList.toggle('active-eye', showOnlyRunning);
        document.getElementById('eyeIcon').innerText = showOnlyRunning ? 'visibility' : 'visibility_off';
        render();
    }

    async function shareAsPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const selM = parseInt(document.getElementById('viewMonth').value);
            const selY = parseInt(document.getElementById('viewYear').value);
            const tV = parseInt(document.getElementById('targetVerz').value) || 1;
            const tB = parseInt(document.getElementById('targetBranded').value) || 1;

            const filtered = sales.filter(s => {
                if(s.isWait || s.date === "2099-12-31") return false;
                const d = new Date(s.date);
                return d.getMonth() === selM && d.getFullYear() === selY;
            }).sort((a,b) => a.date.localeCompare(b.date));

            if (filtered.length === 0) {
                showToast("GEEN DATA DEZE MAAND");
                return;
            }

            let mFx=0, mFl=0, mB=0;
            filtered.forEach(s => { mFx += parseInt(s.qtyFix)||0; mFl += parseInt(s.qtyFlex)||0; mB += parseInt(s.qtyCal)||0; });

            // DARK THEME PDF
            doc.setFillColor(0, 0, 0);
            doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text(`S&S RAPPORT: ${months[selM]} ${selY}`, 14, 20);

            // TOTALEN SECTIE
            doc.setFontSize(10);
            doc.setTextColor(255, 51, 51); doc.text(`FIX: ${mFx}`, 14, 30);
            doc.setTextColor(255, 136, 0); doc.text(`FLX: ${mFl}`, 40, 30);
            doc.setTextColor(255, 255, 255); doc.text(`|  TOTAAL: ${mFx+mFl} (${Math.round(((mFx+mFl)/tV)*100)}%)`, 65, 30);
            doc.setTextColor(77, 184, 255); doc.text(`CAL: ${mB} (${Math.round((mB/tB)*100)}%)`, 14, 37);

            const body = filtered.map(s => [s.date, s.invoice, s.qtyFix, s.qtyFlex, s.qtyCal, s.notes || '']);
            doc.autoTable({
                head: [['DATUM', 'FACTUUR', 'FIX', 'FLX', 'CAL', 'NOTITIE']],
                body: body,
                startY: 45,
                theme: 'grid',
                styles: { fontSize: 8, fillColor: [20, 20, 20], textColor: [255, 255, 255], lineColor: [44, 44, 44] },
                headStyles: { fillColor: [255, 51, 51], textColor: [255, 255, 255], fontStyle: 'bold' },
                columnStyles: { 2: { textColor: [255, 51, 51] }, 3: { textColor: [255, 136, 0] }, 4: { textColor: [77, 184, 255] } }
            });

            const pdfBlob = doc.output('blob');
            const fileName = `SS_Rapport_${months[selM]}_${selY}.pdf`;
            const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'S&S Rapport', text: `Rapportage ${months[selM]} ${selY}` });
            } else {
                doc.save(fileName);
                showToast("GEDOWNLOAD (GEEN SHARING)");
            }
        } catch (e) { console.error(e); showToast("FOUT BIJ DELEN"); }
    }

    function manualExport() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sales));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "ss_backup.json");
        dl.click();
        showToast("EXPORT OK");
    }

    function manualImport(e) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                if(Array.isArray(data)) {
                    sales = data;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
                    render();
                    showToast("IMPORT OK");
                }
            } catch(ex) { showToast("IMPORT FOUT"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function render() {
        const log = document.getElementById('salesLog'), selM = parseInt(document.getElementById('viewMonth').value), selY = parseInt(document.getElementById('viewYear').value), search = document.getElementById('searchInput').value.toLowerCase();
        let mFx=0, mFl=0, mB=0; log.innerHTML = '';
        const today = getLocalDate();

        sales.forEach(s => { 
            if(!s.isWait && s.date !== "2099-12-31") {
                const d = new Date(s.date);
                if(d.getMonth() === selM && d.getFullYear() === selY) {
                    mFx += parseInt(s.qtyFix)||0; mFl += parseInt(s.qtyFlex)||0; mB += parseInt(s.qtyCal)||0; 
                }
            }
        });
        
        document.getElementById('valFix').innerText = mFx; document.getElementById('valFlex').innerText = mFl; document.getElementById('valCal').innerText = mB;
        const tV = parseInt(document.getElementById('targetVerz').value) || 1, tB = parseInt(document.getElementById('targetBranded').value) || 1;
        document.getElementById('fillVerz').style.width = Math.min(((mFx+mFl)/tV)*100, 100) + '%';
        document.getElementById('fillBranded').style.width = Math.min((mB/tB)*100, 100) + '%';
        document.getElementById('percVerz').innerText = Math.round(((mFx+mFl)/tV)*100) + '%';
        document.getElementById('percBranded').innerText = Math.round((mB/tB)*100) + '%';

        sales.sort((a,b) => b.date.localeCompare(a.date)).forEach(s => {
            const isWait = s.isWait || s.date === "2099-12-31";
            const isFuture = !isWait && s.date > today;
            const inSelectedTime = isWait || (new Date(s.date).getMonth() === selM && new Date(s.date).getFullYear() === selY);
            if (!inSelectedTime || (showOnlyRunning && !isWait && !isFuture)) return;
            if (!s.invoice.toLowerCase().includes(search) && !(s.notes && s.notes.toLowerCase().includes(search))) return;

            const dP = s.date.split('-');
            const shortD = isWait ? '---' : `${dP[2]}\n${months[parseInt(dP[1])-1]}`;

            log.innerHTML += `
            <div class="log-item ${isWait ? 'status-wait' : (isFuture ? 'status-future' : '')}">
                <div class="log-grid">
                    <div class="log-date">${shortD}</div>
                    <div class="log-invoice">${s.invoice}</div>
                    <div class="qty-pill">
                        <span class="qty-val-fix">${s.qtyFix}</span>
                        <span class="qty-val-flex">${s.qtyFlex}</span>
                        <span class="qty-val-cal">${s.qtyCal}</span>
                    </div>
                    <div style="display:flex; gap:8px; justify-content:flex-end;">
                        <span class="symbol" style="font-size:18px; color:var(--text-gray); cursor:pointer;" onclick="startEdit(${s.id})">edit</span>
                        <span class="symbol" style="font-size:18px; color:#444; cursor:pointer;" onclick="confirmDelete(${s.id})">delete</span>
                    </div>
                </div>
                ${s.notes ? `<div class="note-text">${s.notes}</div>` : ''}
            </div>`;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    function startEdit(id) {
        const s = sales.find(x => x.id === id); if(!s) return;
        editId = id;
        document.getElementById('invoice').value = s.invoice;
        document.getElementById('notes').value = s.notes || '';
        document.getElementById('qtyFix').value = s.qtyFix;
        document.getElementById('qtyFlex').value = s.qtyFlex;
        document.getElementById('qtyCal').value = s.qtyCal;
        document.getElementById('dateInput').value = s.isWait ? getLocalDate() : s.date;
        document.getElementById('dateUnknown').checked = s.isWait;
        toggleDate(document.getElementById('dateUnknown'));
        document.getElementById('mainSubmitBtn').innerHTML = '<span class="symbol">edit</span>UPDATE';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault();
        const wait = document.getElementById('dateUnknown').checked;
        const data = { 
            invoice: document.getElementById('invoice').value, notes: document.getElementById('notes').value, 
            qtyFix: document.getElementById('qtyFix').value||0, qtyFlex: document.getElementById('qtyFlex').value||0, 
            qtyCal: document.getElementById('qtyCal').value||0, date: wait ? "2099-12-31" : document.getElementById('dateInput').value, isWait: wait 
        };
        if(editId) {
            const idx = sales.findIndex(x => x.id === editId);
            sales[idx] = { ...sales[idx], ...data };
            editId = null;
            document.getElementById('mainSubmitBtn').innerHTML = '<span class="symbol">add_task</span>OPSLAAN';
        } else { sales.push({ id: Date.now(), ...data }); }
        this.reset(); document.getElementById('dateInput').value = getLocalDate(); toggleDate(document.getElementById('dateUnknown')); render(); showToast("OK");
    };

    function saveTargets() {
        localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value);
        localStorage.setItem('ss_t_b', document.getElementById('targetBranded').value);
        render();
    }

    function confirmDelete(id) { if(confirm('WISSEN?')) { sales = sales.filter(x => x.id !== id); render(); } }

    window.onload = function() {
        const mS = document.getElementById('viewMonth'), yS = document.getElementById('viewYear'), n = new Date();
        months.forEach((m, i) => mS.innerHTML += `<option value="${i}" ${i === n.getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`);
        [n.getFullYear(), n.getFullYear()-1].forEach(y => yS.innerHTML += `<option value="${y}" ${y === n.getFullYear() ? 'selected' : ''}>${y}</option>`);
        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 40;
        document.getElementById('targetBranded').value = localStorage.getItem('ss_t_b') || 10;
        document.getElementById('dateInput').value = getLocalDate();
        render();
    };
</script>
</body>
</html>
