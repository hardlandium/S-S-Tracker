<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S&S Tracker V182</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --mm-red: #ff3333; --mm-orange: #ff8800; --mm-gradient: linear-gradient(135deg, #ff4d4d 0%, #df0000 100%);
            --bg: #000; --card-bg: #161616; --text-dark: #fff; --text-gray: #999;
            --color-cal: #4db8ff; --color-ok: #00ff88; --mm-font: 'Arial Black', sans-serif;
        }
        body { font-family: var(--mm-font); font-weight: 900; font-style: italic; background: var(--bg); margin: 0; padding-bottom: env(safe-area-inset-bottom); color: var(--text-dark); text-transform: uppercase; overflow-x: hidden; }
        
        header { 
            padding: calc(10px + env(safe-area-inset-top)) 10px 5px 10px; 
            text-align: center; 
        }

        .container { padding: 0 8px; max-width: 480px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 12px; margin-top: 10px; border: 1px solid #222; }
        
        /* LOGO KADER STIJL */
        .logo-card {
            text-align: center;
            padding: 15px 10px;
            border-bottom: 2px solid var(--mm-red);
            margin-bottom: 0;
        }
        .logo-card .title-main { color: var(--mm-red); font-size: 1.4rem; line-height: 1; letter-spacing: -1px; display: block; }
        .logo-card .title-sub { color: var(--text-gray); font-size: 0.8rem; letter-spacing: 3px; display: block; margin-top: 2px; }

        .day-box { display: flex; background: #111; border-radius: 10px; padding: 8px; border: 1px solid #222; margin-bottom: 15px; }
        .day-stat { text-align: center; flex: 1; border-right: 1px solid #222; }
        .day-stat:last-child { border: none; }
        .day-stat b { display: block; font-size: 1.1rem; }
        .day-stat span { font-size: 0.55rem; color: var(--text-gray); }
        
        .target-row { display: flex; justify-content: space-between; align-items: flex-end; font-size: 0.65rem; margin-bottom: 4px; color: var(--text-gray); }
        .target-input-clean { background: #000; border: 1px solid #333; color: var(--text-gray); width: 55px; height: 24px; border-radius: 4px; text-align: center; font-family: inherit; font-weight: 900; font-size: 11px; }
        .progress-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .fill { height: 100%; transition: width 0.4s ease; border-radius: 6px; }
        
        input, select { width: 100%; height: 40px; border-radius: 8px; border: 1px solid #333; background: #222; color: var(--text-gray); font-family: inherit; font-weight: 900; font-style: italic; padding: 0 10px; box-sizing: border-box; font-size: 13px; }
        input::placeholder { color: #666; }
        label { font-size: 0.6rem; color: var(--text-gray); display: block; margin-bottom: 2px; }
        
        .qty-control { display: flex; background: #111; border-radius: 8px; border: 1px solid #333; height: 42px; }
        .qty-btn { background: #222; border: none; color: #fff; width: 34px; font-weight: 900; cursor: pointer; }
        .qty-control input { flex: 1; border: none; background: transparent; text-align: center; font-size: 1.2rem; color: #fff; }
        
        .save-btn { background: var(--mm-gradient); color: #fff; border: none; width: 50px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .save-btn.editing { background: var(--color-ok); color: #000; }
        
        .log-item { background: #0c0c0c; border-radius: 16px; padding: 14px; margin-bottom: 10px; border-left: 6px solid #333; display: flex; flex-direction: column; gap: 4px; }
        .status-wait { border-left-color: var(--color-cal); } 
        .status-open { border-left-color: var(--color-ok); }   
        .status-done { border-left-color: #333; opacity: 0.6; } 
        
        .log-main-row { display: flex; align-items: center; justify-content: space-between; }
        .log-left-data { display: flex; align-items: center; gap: 12px; flex: 1; }
        .log-date { color: var(--text-gray); font-size: 0.85rem; min-width: 42px; font-style: italic; }
        .log-invoice { font-size: 1.1rem; letter-spacing: 0.5px; cursor: pointer; color: #fff; }
        .qty-pill { background: #000; padding: 4px 12px; border-radius: 8px; border: 1px solid #1a1a1a; display: flex; gap: 10px; font-size: 0.95rem; }
        .note-text { color: var(--mm-orange); font-size: 0.85rem; margin-top: 2px; }
        
        .action-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 15px; }
        .btn-action { height: 44px; border-radius: 10px; border: 1px solid #333; background: #111; color: var(--text-gray); font-size: 0.45rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .symbol { font-family: 'Material Symbols Rounded'; font-size: 20px; }
        
        #datePickerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333; width: 85%; max-width: 320px; text-align: center; }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); color: #000; padding: 8px 16px; border-radius: 20px; font-size: 0.7rem; z-index: 2000; display: none; pointer-events: none; }
    </style>
</head>
<body>

<header></header>

<div id="toast">GEKOPIEERD</div>

<div class="container">
    <div class="card logo-card">
        <span class="title-main">SERVICES & SOLUTIONS</span>
        <span class="title-sub">TRACKER</span>
    </div>

    <div class="card" id="statsCard">
        <div class="day-box">
            <div class="day-stat"><b id="mVerz">0</b><span>MAAND</span></div>
            <div class="day-stat"><b id="mFix" style="color:var(--mm-red);">0</b><span>FIX</span></div>
            <div class="day-stat"><b id="mFlex" style="color:var(--mm-orange);">0</b><span>FLX</span></div>
            <div class="day-stat"><b id="mCal" style="color:var(--color-cal);">0</b><span>BS</span></div>
        </div>
        <div class="target-row"><span>MAAND DOEL VZK (<span id="percVerz" style="color:var(--mm-red)">0%</span>)</span><input type="number" id="targetVerz" class="target-input-clean" oninput="saveTargets()"></div>
        <div class="progress-bar"><div id="fillVerz" class="fill" style="background:var(--mm-red); width:0%;"></div></div>
        <div class="target-row" style="margin-top:10px;"><span>MAAND DOEL BS (<span id="percBranded" style="color:var(--color-cal)">0%</span>)</span><input type="number" id="targetBranded" class="target-input-clean" oninput="saveTargets()"></div>
        <div class="progress-bar"><div id="fillBranded" class="fill" style="background:var(--color-cal); width:0%;"></div></div>
    </div>

    <div class="card" id="inputCard">
        <form id="saleForm">
            <div style="display:flex; gap:6px; margin-bottom:8px;">
                <div style="flex:1;"><label>FACTUUR</label><input type="text" id="invoice" inputmode="numeric" placeholder="..." required></div>
                <div style="flex:1;"><label>NOTITIE</label><input type="text" id="notes" placeholder="..."></div>
            </div>
            <div style="display:flex; gap:6px; margin-bottom:8px;">
                <div style="flex:1;"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyFix',-1)">-</button><input type="number" id="qtyFix" placeholder="FX"><button type="button" class="qty-btn" onclick="adj('qtyFix',1)">+</button></div></div>
                <div style="flex:1;"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyFlex',-1)">-</button><input type="number" id="qtyFlex" placeholder="FL"><button type="button" class="qty-btn" onclick="adj('qtyFlex',1)">+</button></div></div>
                <div style="flex:1;"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyCal',-1)">-</button><input type="number" id="qtyCal" placeholder="BS"><button type="button" class="qty-btn" onclick="adj('qtyCal',1)">+</button></div></div>
            </div>
            <div style="display:flex; gap:6px; align-items:flex-end;">
                <div style="flex:1;"><label>DATUM</label><input type="date" id="dateInput" required></div>
                <div onclick="forceToday()" style="width:40px; height:40px; background:#111; border:1px solid #333; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer;"><span class="symbol" style="color:var(--text-gray); font-size:18px;">restart_alt</span></div>
                <div class="date-unknown-box" onclick="toggleDateViaBox()" style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:50px; height:40px; background:#111; border-radius:8px; border:1px solid #333; cursor:pointer;"><span style="font-size:0.45rem; color:var(--text-gray);">WACHT</span><input type="checkbox" id="dateUnknown" style="display:none" onchange="toggleDate(this)"></div>
                <button type="submit" id="mainSaveBtn" class="save-btn"><span class="symbol">add_task</span></button>
            </div>
        </form>
    </div>

    <div class="card">
        <div style="display:flex; gap:6px; margin-bottom:12px; align-items:center;">
            <select id="viewMonth" onchange="render()" style="flex:2;"></select>
            <select id="viewYear" onchange="render()" style="flex:1;"></select>
            <div class="eye-filter" id="eyeFilter" onclick="toggleEye()" style="cursor:pointer; width:40px; text-align:center;">
                <span class="symbol" id="eyeIcon" style="color:#444;">visibility</span>
            </div>
        </div>
        <div id="salesLog"></div>
        <div class="action-grid">
            <div class="btn-action" onclick="shareData()"><span class="symbol">share</span>DEEL</div>
            <div class="btn-action" onclick="exportPDF()"><span class="symbol">picture_as_pdf</span>PDF</div>
            <div class="btn-action" onclick="manualExport()"><span class="symbol">table_view</span>CSV</div>
            <div class="btn-action" onclick="document.getElementById('importInput').click()"><span class="symbol">upload_file</span>IMP</div>
            <div class="btn-action" onclick="if(confirm('WISSEN?')){localStorage.clear();location.reload();}" style="color:#444;"><span class="symbol">delete_forever</span>CLR</div>
        </div>
        <input type="file" id="importInput" style="display:none" accept=".csv" onchange="manualImport(event)">
    </div>
</div>

<div id="datePickerModal">
    <div class="modal-content">
        <label style="color: var(--mm-red); display:block; margin-bottom:15px;">WIJZIG DATUM</label>
        <input type="date" id="modalDateInput" style="margin-bottom:15px;">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="background:#333; color:#fff; flex:1; height:45px; border-radius:10px; border:none; font-family:inherit; font-weight:900; font-style:italic;">STOP</button>
            <button onclick="confirmDateChange()" style="background:var(--color-ok); color:#000; flex:1; height:45px; border-radius:10px; border:none; font-family:inherit; font-weight:900; font-style:italic;">OK</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SS_DATA_V182';
    let sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let activeEditId = null;
    let currentlyEditingOrderId = null;
    let onlyOpen = false;
    const months = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];

    function getLocalDate() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function forceToday() {
        document.getElementById('dateInput').value = getLocalDate();
        showToast("DATUM HERSTELD");
    }

    function cleanStr(s) { return String(s || "").replace(/"/g, "").trim(); }
    function forceNum(n) { let num = parseInt(String(n).replace(/"/g, "")); return isNaN(num) ? 0 : num; }

    function showToast(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 1500);
    }

    function copyInv(val) { navigator.clipboard.writeText(val); showToast("GEKOPIEERD"); }

    function toggleEye() {
        onlyOpen = !onlyOpen;
        document.getElementById('eyeIcon').style.color = onlyOpen ? 'var(--mm-red)' : '#444';
        render();
    }

    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }
    function closeModal() { document.getElementById('datePickerModal').style.display = 'none'; }
    function toggleDateViaBox() { const cb = document.getElementById('dateUnknown'); cb.checked = !cb.checked; toggleDate(cb); }

    function toggleDate(cb) {
        const di = document.getElementById('dateInput');
        document.querySelector('.date-unknown-box').style.borderColor = cb.checked ? 'var(--color-cal)' : '#333';
        if(cb.checked) { di.disabled = true; di.style.opacity = "0.2"; di.required = false; }
        else { di.disabled = false; di.style.opacity = "1"; di.required = true; di.value = getLocalDate(); }
    }

    function saveTargets() {
        localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value);
        localStorage.setItem('ss_t_b', document.getElementById('targetBranded').value);
        render();
    }

    function removeSale(id) { if(confirm('WISSEN?')) { sales = sales.filter(s => s.id !== id); render(); } }

    function editOrder(id) {
        const s = sales.find(x => x.id === id);
        if(!s) return;
        currentlyEditingOrderId = id;
        document.getElementById('invoice').value = s.invoice;
        document.getElementById('notes').value = s.notes;
        document.getElementById('qtyFix').value = s.qtyFix;
        document.getElementById('qtyFlex').value = s.qtyFlex;
        document.getElementById('qtyCal').value = s.qtyCal;
        const cb = document.getElementById('dateUnknown');
        cb.checked = s.isWait;
        toggleDate(cb);
        if(!s.isWait) document.getElementById('dateInput').value = s.date;
        document.getElementById('mainSaveBtn').classList.add('editing');
        document.getElementById('mainSaveBtn').innerHTML = '<span class="symbol">edit</span>';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openDateModal(id, current) {
        activeEditId = id;
        document.getElementById('modalDateInput').value = (current && current !== "2099-12-31") ? current : getLocalDate();
        document.getElementById('datePickerModal').style.display = 'flex';
    }

    function confirmDateChange() {
        const newDate = document.getElementById('modalDateInput').value;
        const idx = sales.findIndex(s => s.id === activeEditId);
        if(idx !== -1 && newDate) { sales[idx].date = newDate; sales[idx].isWait = false; closeModal(); render(); }
    }

    function render() {
        const log = document.getElementById('salesLog');
        const selM = parseInt(document.getElementById('viewMonth').value);
        const selY = parseInt(document.getElementById('viewYear').value);
        const todayStr = getLocalDate();

        let mFx=0, mFl=0, mB=0;
        log.innerHTML = '';
        
        sales.forEach(s => {
            if(!s.isWait) {
                const sDate = new Date(s.date);
                if(sDate.getMonth() === selM && sDate.getFullYear() === selY) {
                    mFx += forceNum(s.qtyFix); mFl += forceNum(s.qtyFlex); mB += forceNum(s.qtyCal);
                }
            }
        });

        document.getElementById('mVerz').innerText = (mFx + mFl);
        document.getElementById('mFix').innerText = mFx; 
        document.getElementById('mFlex').innerText = mFl; 
        document.getElementById('mCal').innerText = mB;

        const tV = parseInt(document.getElementById('targetVerz').value) || 1;
        const tB = parseInt(document.getElementById('targetBranded').value) || 1;
        document.getElementById('percVerz').innerText = Math.round(((mFx + mFl) / tV) * 100) + '%';
        document.getElementById('fillVerz').style.width = Math.min(((mFx + mFl) / tV) * 100, 100) + '%';
        document.getElementById('percBranded').innerText = Math.round((mB / tB) * 100) + '%';
        document.getElementById('fillBranded').style.width = Math.min((mB / tB) * 100, 100) + '%';

        let sorted = [...sales].sort((a, b) => (a.isWait === b.isWait) ? b.date.localeCompare(a.date) : (a.isWait ? -1 : 1));

        sorted.forEach(s => {
            const isToday = !s.isWait && s.date === todayStr;
            const isFuture = !s.isWait && s.date > todayStr;
            const sDate = new Date(s.date);
            const isThisMonth = sDate.getMonth() === selM && sDate.getFullYear() === selY;

            let show = false;
            if (onlyOpen) { if (s.isWait || isToday || isFuture) show = true; } 
            else { if (s.isWait || isThisMonth || isToday || isFuture) show = true; }

            if (show) {
                let statusClass = 'status-done';
                if(s.isWait) statusClass = 'status-wait';
                else if(isFuture) statusClass = 'status-open';
                
                const dateDisplay = s.isWait ? "WACHT" : s.date.split('-').reverse().slice(0,2).join('/');
                log.innerHTML += `
                    <div class="log-item ${statusClass}">
                        <div class="log-main-row">
                            <div class="log-left-data">
                                <span class="log-date" onclick="openDateModal(${s.id}, '${s.date}')">${dateDisplay}</span>
                                <span class="log-invoice" onclick="copyInv('${cleanStr(s.invoice)}')">${cleanStr(s.invoice)}</span>
                                <div class="qty-pill">
                                    <span style="color:var(--mm-red)">${forceNum(s.qtyFix)}</span>
                                    <span style="color:var(--mm-orange)">${forceNum(s.qtyFlex)}</span>
                                    <span style="color:var(--color-cal)">${forceNum(s.qtyCal)}</span>
                                </div>
                            </div>
                            <div class="log-actions">
                                <span class="symbol" onclick="editOrder(${s.id})" style="color:var(--text-gray); font-size:18px; cursor:pointer;">edit</span>
                                <span class="symbol" onclick="removeSale(${s.id})" style="color:var(--text-gray); font-size:18px; cursor:pointer;">delete</span>
                            </div>
                        </div>
                        ${s.notes ? `<div class="note-text">${cleanStr(s.notes)}</div>` : ''}
                    </div>`;
            }
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault();
        const wait = document.getElementById('dateUnknown').checked;
        const orderData = {
            id: currentlyEditingOrderId || Date.now(),
            invoice: cleanStr(document.getElementById('invoice').value),
            notes: cleanStr(document.getElementById('notes').value),
            qtyFix: forceNum(document.getElementById('qtyFix').value),
            qtyFlex: forceNum(document.getElementById('qtyFlex').value),
            qtyCal: forceNum(document.getElementById('qtyCal').value),
            date: wait ? "2099-12-31" : document.getElementById('dateInput').value,
            isWait: wait
        };
        if(currentlyEditingOrderId) {
            sales[sales.findIndex(x => x.id === currentlyEditingOrderId)] = orderData;
            currentlyEditingOrderId = null;
            document.getElementById('mainSaveBtn').classList.remove('editing');
            document.getElementById('mainSaveBtn').innerHTML = '<span class="symbol">add_task</span>';
        } else { sales.push(orderData); }
        updateYearList(); this.reset(); toggleDate(document.getElementById('dateUnknown')); render();
    };

    function updateYearList() {
        const yS = document.getElementById('viewYear'); const currentYear = new Date().getFullYear();
        let years = [currentYear];
        sales.forEach(s => { if(s.date && s.date !== "2099-12-31") { const y = parseInt(s.date.split('-')[0]); if(!years.includes(y)) years.push(y); } });
        years.sort((a,b) => b-a);
        const prev = yS.value; yS.innerHTML = '';
        years.forEach(y => { yS.innerHTML += `<option value="${y}">${y}</option>`; });
        yS.value = prev || currentYear;
    }

    function shareData() {
        const selM = document.getElementById('viewMonth').value;
        const selY = document.getElementById('viewYear').value;
        let t = `S&S RAPPORT - ${months[selM]} ${selY}\n\n`;
        sales.filter(s => !s.isWait && new Date(s.date).getMonth() == selM && new Date(s.date).getFullYear() == selY).forEach(s => {
            t += `${s.date.split('-').reverse().join('-')} | ${cleanStr(s.invoice)} | FX:${s.qtyFix} FL:${s.qtyFlex} BS:${s.qtyCal}\n`;
        });
        navigator.share ? navigator.share({text:t}) : navigator.clipboard.writeText(t);
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selM = document.getElementById('viewMonth').value;
        const selY = document.getElementById('viewYear').value;
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.setTextColor(255, 51, 51);
        doc.text(`SERVICES & SOLUTIONS`, 14, 20);
        
        doc.setFontSize(10);
        doc.setTextColor(150, 150, 150);
        doc.text(`TRACKER REPORT: ${months[selM].toUpperCase()} ${selY}`, 14, 28);

        const filtered = sales.filter(s => {
            if(s.isWait) return false;
            const d = new Date(s.date);
            return d.getMonth() == selM && d.getFullYear() == selY;
        }).sort((a,b) => a.date.localeCompare(b.date));

        const body = filtered.map(s => [
            s.date.split('-').reverse().slice(0,2).join('/'),
            cleanStr(s.invoice),
            s.qtyFix,
            s.qtyFlex,
            s.qtyCal,
            cleanStr(s.notes)
        ]);

        doc.autoTable({
            head: [['DATUM', 'FACTUUR', 'FIX', 'FLEX', 'BS', 'NOTITIE']],
            body: body,
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [22, 22, 22], textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center' },
            columnStyles: {
                0: { halign: 'center', cellWidth: 20 },
                1: { fontStyle: 'bold', cellWidth: 35 },
                2: { halign: 'center', textColor: [255, 51, 51], fontStyle: 'bold' },
                3: { halign: 'center', textColor: [255, 136, 0], fontStyle: 'bold' },
                4: { halign: 'center', textColor: [77, 184, 255], fontStyle: 'bold' },
                5: { fontStyle: 'italic', fontSize: 8 }
            },
            styles: { font: "helvetica", fontSize: 10, cellPadding: 4 },
            alternateRowStyles: { fillColor: [250, 250, 250] }
        });

        doc.save(`SS_Report_${months[selM]}_${selY}.pdf`);
    }

    function manualExport() {
        let csv = "DATUM;FACTUUR;FIX;FLEX;BS;NOTITIE\n";
        sales.forEach(s => { csv += `${s.date};${cleanStr(s.invoice)};${s.qtyFix};${s.qtyFlex};${s.qtyCal};${cleanStr(s.notes)}\n`; });
        const b = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'SS_Data.csv'; a.click();
    }

    function manualImport(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            const importedSales = [];
            for (let i = 1; i < lines.length; i++) {
                const sep = lines[i].includes(';') ? ';' : ',';
                const col = lines[i].split(sep);
                if (col.length >= 5) {
                    importedSales.push({ id: Date.now() + i, date: cleanStr(col[0]), invoice: cleanStr(col[1]), qtyFix: forceNum(col[2]), qtyFlex: forceNum(col[3]), qtyCal: forceNum(col[4]), notes: cleanStr(col[5] || ""), isWait: cleanStr(col[0]).includes("2099") });
                }
            }
            if(importedSales.length > 0) { sales = importedSales; updateYearList(); render(); alert("IMPORT VOLTOOID"); }
        };
        reader.readAsText(file);
    }

    window.onload = function() {
        const mS = document.getElementById('viewMonth'), n = new Date();
        months.forEach((m, i) => { mS.innerHTML += `<option value="${i}" ${i === n.getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`; });
        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 40;
        document.getElementById('targetBranded').value = localStorage.getItem('ss_t_b') || 10;
        document.getElementById('dateInput').value = getLocalDate();
        updateYearList(); render();
    };
</script>
</body>
