<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S&S Tracker V368-SCROLL-FIX</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%23ff3333%22 font-family=%22Arial%22>S</text></svg>">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --mm-red: #ff3333; --mm-orange: #ff9900;
            --bg: #000; --card-bg: #161616;
            --log-bg: #000;
            --header-bg: #161616;
            --text-gray: #999999; 
            --color-wait: #4db8ff; --color-future: #00ff88;
            --mm-font: 'Arial Black', sans-serif;
            --h-unit: 44px;
            --skew-deg: -10deg;
            --c-mda: #ffffff; --c-sda: #ffcc00; --c-tel: #00ff66;
            --c-it: #0099ff; --c-ktv: #ff3333; --c-hifi: #cc33ff;
            --btn-save: #006633;
            --btn-update: #0055ff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--mm-font); font-weight: 900; font-style: italic; background: var(--bg); margin: 0; padding-bottom: 80px; color: #fff; text-transform: uppercase; }
        .container { padding: 0 8px; max-width: 480px; margin: 0 auto; display: block; min-height: 100vh; }
        
        .card { background: var(--card-bg); border-radius: 16px; padding: 14px 12px; margin-top: 10px; border: 1px solid #222; position: relative; }
        
        .skew-content { transform: skewX(var(--skew-deg)); display: inline-block; }

        .btn-base { cursor: pointer; color: #fff; transform: skewX(var(--skew-deg)); border-radius: 6px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-family: var(--mm-font); font-style: italic; font-weight: 900; border: none; }
        .btn-base .inner-txt { display: flex; align-items: center; gap: 4px; }

        .input-skew { height: var(--h-unit); border: 1px solid #333; background: #000; transform: skewX(var(--skew-deg)); border-radius: 6px; display: flex; overflow: hidden; position: relative; }
        .input-skew input, .input-skew select { background: transparent; border: none; color: #fff; font-family: var(--mm-font); font-style: italic; font-weight: 900; font-size: 14px; width: 100%; text-align: center; outline: none; appearance: none; padding: 0 10px; }

        .qty-control-skew { display: grid; grid-template-columns: 32px 1fr 32px; background: #000; border: 1px solid #222; height: var(--h-unit); transform: skewX(var(--skew-deg)); border-radius: 6px; overflow: hidden; }
        .qty-btn-skew { background: #1a1a1a; border: none; cursor: pointer; font-family: var(--mm-font); font-weight: 900; font-size: 20px; color: #fff; }
        .qty-input-skew { background: transparent; border: none; text-align: center; font-family: var(--mm-font); font-weight: 900; font-size: 16px; width: 100%; outline: none; font-style: italic; color: #fff; }

        .progress-bar-wrapper { height: 32px; background: #000; border-radius: 4px; overflow: hidden; border: 1px solid #222; position: relative; display: flex; align-items: center; transform: skewX(var(--skew-deg)); }
        .fill-segment { height: 100%; transition: width 0.8s ease; position: absolute; }
        #fillFix { background: linear-gradient(90deg, #600, var(--mm-red)); z-index: 1; }
        #fillFlexSegment { background: linear-gradient(90deg, #630, var(--mm-orange)); z-index: 1; }
        #fillBranded { background: linear-gradient(90deg, #036, var(--color-wait)); z-index: 1; }

        .chart-stat { position: relative; z-index: 10; font-size: 11px; display: flex; align-items: center; gap: 4px; padding: 0 10px; width: 100%; justify-content: space-around; pointer-events: none; }
        .chart-stat .label { font-size: 7px; opacity: 0.6; }

        .dept-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; padding: 0 4px; }
        .dept-legend-item { font-size: 9px; display: flex; align-items: center; gap: 3px; font-weight: 900; transform: skewX(var(--skew-deg)); }
        .dept-legend-item .dot { width: 6px; height: 6px; border-radius: 1px; }

        /* LIST SCROLL OPTIMIZED */
        .date-header { background: var(--header-bg); padding: 10px 14px; border-radius: 12px; cursor: pointer; margin-bottom: 6px; border: 1px solid #282828; display: flex; justify-content: space-between; align-items: center; }
        .log-item { background: var(--log-bg); border-radius: 12px; padding: 10px; margin-bottom: 4px; border: 1px solid #1a1a1a; }
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; background: #161616; padding: 3px; border-radius: 4px; border: 1px solid #222; transform: skewX(var(--skew-deg)); }
        .s-val { font-size: 13px; font-weight: 900; line-height: 1; text-align: center; }

        .dept-chip { color: var(--text-gray); font-size: 9px; background: #000; border: 1px solid #333; height: 38px; }
        .dept-chip.active { border-color: #fff; background: rgba(255,255,255,0.15); color: #fff; }
        
        .dept-tag { font-size: 8px; display: flex; align-items: center; gap: 2px; font-weight: 900; margin-top: 4px; transform: skewX(var(--skew-deg)); }
        .tag-MDA { color: var(--c-mda); } .tag-SDA { color: var(--c-sda); } .tag-TELCO { color: var(--c-tel); }
        .tag-IT { color: var(--c-it); } .tag-KTV { color: var(--c-ktv); } .tag-HIFI { color: var(--c-hifi); }
        
        .grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div style="background: var(--mm-red); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; transform: skewX(-10deg);"><span style="color: #000; font-size: 16px;">S</span></div>
                <div style="font-size: 11px; letter-spacing: 1px; color: var(--text-gray);">PERFORMANCE HUB V368</div>
            </div>
            <div id="percGlobal" style="font-size: 20px; color: var(--color-future);">0%</div>
        </div>

        <div class="grid-12" style="align-items: center; margin-bottom: 4px;">
            <div style="grid-column: span 9;">
                <div class="progress-bar-wrapper">
                    <div class="chart-stat">
                        <span><span class="label">FIX</span> <span id="chartFix" style="color:var(--mm-red)">0</span></span>
                        <span><span class="label">FLX</span> <span id="chartFlex" style="color:var(--mm-orange)">0</span></span>
                    </div>
                    <div id="fillFix" class="fill-segment"></div>
                    <div id="fillFlexSegment" class="fill-segment"></div>
                </div>
            </div>
            <div style="grid-column: span 3;"><div class="input-skew" style="height:32px;"><input type="number" id="targetVerz" oninput="saveTargets()" placeholder="TGT"></div></div>
        </div>

        <div class="grid-12" style="align-items: center; margin-bottom: 4px;">
            <div style="grid-column: span 9;">
                <div class="progress-bar-wrapper">
                    <div class="chart-stat" style="justify-content: center;">
                        <span><span class="label">CALIBRATION</span> <span id="chartCal" style="color:var(--color-wait)">0</span></span>
                    </div>
                    <div id="fillBranded" class="fill-segment"></div>
                </div>
            </div>
            <div style="grid-column: span 3;"><div class="input-skew" style="height:32px;"><input type="number" id="targetCal" oninput="saveTargets()" placeholder="TGT"></div></div>
        </div>

        <div class="dept-legend" id="deptLegend"></div>

        <div class="grid-12" style="margin-top: 12px; border-top: 1px solid #222; padding-top: 10px;">
            <div class="btn-base" style="grid-column: span 3; color: var(--text-gray);" onclick="shareAsPDF()"><div class="inner-txt"><span class="material-icons" style="color:var(--mm-orange); font-size:14px;">share</span>PDF</div></div>
            <div class="btn-base" style="grid-column: span 3; color: var(--text-gray);" onclick="manualExport()"><div class="inner-txt"><span class="material-icons" style="color:var(--color-future); font-size:14px;">download</span>EXP</div></div>
            <div class="btn-base" style="grid-column: span 3; color: var(--text-gray);" onclick="document.getElementById('impInp').click()"><div class="inner-txt"><span class="material-icons" style="color:var(--color-wait); font-size:14px;">upload</span>IMP</div></div>
            <div class="btn-base" style="grid-column: span 3; color: var(--text-gray);" onclick="if(confirm('WISSEN?')){localStorage.clear();location.reload();}"><div class="inner-txt"><span class="material-icons" style="color:var(--mm-red); font-size:14px;">delete_forever</span>CLR</div></div>
        </div>
        <input type="file" id="impInp" style="display:none" accept=".csv" onchange="manualImport(event)">
    </div>

    <div class="card">
        <form id="saleForm">
            <div class="grid-12" style="margin-bottom: 8px; gap: 4px;">
                <div class="btn-base dept-chip" data-dept="MDA" onclick="toggleDept(this, 'MDA')" style="grid-column: span 4;"><div class="inner-txt"><span class="material-icons" style="color:var(--c-mda); font-size:12px;">local_laundry_service</span>MDA</div></div>
                <div class="btn-base dept-chip" data-dept="SDA" onclick="toggleDept(this, 'SDA')" style="grid-column: span 4;"><div class="inner-txt"><span class="material-icons" style="color:var(--c-sda); font-size:12px;">cleaning_services</span>SDA</div></div>
                <div class="btn-base dept-chip" data-dept="TELCO" onclick="toggleDept(this, 'TELCO')" style="grid-column: span 4;"><div class="inner-txt"><span class="material-icons" style="color:var(--c-tel); font-size:12px;">smartphone</span>TEL</div></div>
                <div class="btn-base dept-chip" data-dept="IT" onclick="toggleDept(this, 'IT')" style="grid-column: span 4;"><div class="inner-txt"><span class="material-icons" style="color:var(--c-it); font-size:12px;">laptop</span>IT</div></div>
                <div class="btn-base dept-chip" data-dept="KTV" onclick="toggleDept(this, 'KTV')" style="grid-column: span 4;"><div class="inner-txt"><span class="material-icons" style="color:var(--c-ktv); font-size:12px;">tv</span>KTV</div></div>
                <div class="btn-base dept-chip" data-dept="HIFI" onclick="toggleDept(this, 'HIFI')" style="grid-column: span 4;"><div class="inner-txt"><span class="material-icons" style="color:var(--c-hifi); font-size:12px;">speaker</span>HIFI</div></div>
            </div>
            
            <div class="grid-12">
                <div class="input-skew" style="grid-column: span 5;"><input type="text" id="invoice" placeholder="INV #" required></div>
                <div class="input-skew" style="grid-column: span 7;"><input type="text" id="notes" placeholder="NOTITIES..."></div>
            </div>

            <div class="grid-12">
                <div class="qty-control-skew" style="grid-column: span 4;"><button type="button" class="qty-btn-skew" onclick="adj('qtyFix',-1)" style="color:var(--mm-red)">-</button><input type="number" id="qtyFix" class="qty-input-skew" placeholder="FIX"><button type="button" class="qty-btn-skew" onclick="adj('qtyFix',1)" style="color:var(--mm-red)">+</button></div>
                <div class="qty-control-skew" style="grid-column: span 4;"><button type="button" class="qty-btn-skew" onclick="adj('qtyFlex',-1)" style="color:var(--mm-orange)">-</button><input type="number" id="qtyFlex" class="qty-input-skew" placeholder="FLX"><button type="button" class="qty-btn-skew" onclick="adj('qtyFlex',1)" style="color:var(--mm-orange)">+</button></div>
                <div class="qty-control-skew" style="grid-column: span 4;"><button type="button" class="qty-btn-skew" onclick="adj('qtyCal',-1)" style="color:var(--color-wait)">-</button><input type="number" id="qtyCal" class="qty-input-skew" placeholder="CAL"><button type="button" class="qty-btn-skew" onclick="adj('qtyCal',1)" style="color:var(--color-wait)">+</button></div>
            </div>

            <div class="grid-12">
                <div class="input-skew" style="grid-column: span 5;"><input type="date" id="dateInput" required></div>
                <button type="submit" id="submitBtn" class="btn-base" style="grid-column: span 7; background: var(--btn-save);">
                    <div class="inner-txt"><span class="material-icons" id="btnIcon" style="font-size:16px;">save</span><span id="btnText">SAVE</span></div>
                </button>
            </div>
        </form>
    </div>

    <div class="card" style="padding: 10px;">
        <div class="grid-12" style="margin-bottom: 8px;">
            <div class="input-skew" style="grid-column: span 6;"><select id="viewMonth" onchange="render()"></select></div>
            <div class="input-skew" style="grid-column: span 6;"><select id="viewYear" onchange="render()"></select></div>
        </div>
        
        <div class="input-skew" style="border-color: #444;">
            <input type="text" id="searchInput" placeholder="ZOEKEN OP INV OF NOTITIE..." oninput="render()">
            <span class="material-icons" style="position: absolute; right: 12px; top: 11px; font-size: 18px; color: #444;">search</span>
        </div>
    </div>

    <div style="padding: 0 4px; margin-top:15px;" id="salesLog"></div>
</div>

<script>
    const STORAGE_KEY = 'SS_DATA_MASTER';
    let sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let selectedDepts = [];
    let editId = null;
    let collapsedDates = {}; 
    const months = ["JANUARI", "FEBRUARI", "MAART", "APRIL", "MEI", "JUNI", "JULI", "AUGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DECEMBER"];
    
    const DEPT_CFG = {
        'MDA': { icon: 'local_laundry_service', color: 'var(--c-mda)' },
        'SDA': { icon: 'cleaning_services', color: 'var(--c-sda)' },
        'TELCO': { icon: 'smartphone', color: 'var(--c-tel)' },
        'IT': { icon: 'laptop', color: 'var(--c-it)' },
        'KTV': { icon: 'tv', color: 'var(--c-ktv)' },
        'HIFI': { icon: 'speaker', color: 'var(--c-hifi)' }
    };

    function toggleDept(el, dept) {
        if (selectedDepts.includes(dept)) { selectedDepts = selectedDepts.filter(d => d !== dept); el.classList.remove('active'); } 
        else { selectedDepts.push(dept); el.classList.add('active'); }
    }

    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }
    function toggleGroup(date) { collapsedDates[date] = !collapsedDates[date]; render(); }

    function render() {
        const log = document.getElementById('salesLog');
        const selM = parseInt(document.getElementById('viewMonth').value);
        const selY = parseInt(document.getElementById('viewYear').value);
        const searchQ = document.getElementById('searchInput').value.toLowerCase();
        
        let mFx=0, mFl=0, mB=0; 
        let deptTotals = { MDA:0, SDA:0, TELCO:0, IT:0, KTV:0, HIFI:0 };
        log.innerHTML = '';

        const filteredSales = sales.filter(s => {
            const d = new Date(s.date);
            const dateMatch = d.getMonth() === selM && d.getFullYear() === selY;
            const searchMatch = s.invoice.toLowerCase().includes(searchQ) || (s.notes && s.notes.toLowerCase().includes(searchQ));
            return dateMatch && searchMatch;
        });

        filteredSales.forEach(s => { 
            mFx += s.qtyFix; mFl += s.qtyFlex; mB += s.qtyCal;
            s.dept.forEach(d => { if(deptTotals[d] !== undefined) deptTotals[d] += (s.qtyFix + s.qtyFlex + s.qtyCal); });
        });

        document.getElementById('chartFix').innerText = mFx;
        document.getElementById('chartFlex').innerText = mFl;
        document.getElementById('chartCal').innerText = mB;

        const tV = parseInt(document.getElementById('targetVerz').value) || 1, tC = parseInt(document.getElementById('targetCal').value) || 1;
        document.getElementById('percGlobal').innerText = Math.round(((mFx+mFl)/tV)*100) + '%';
        
        const fW = Math.min((mFx/tV)*100, 100);
        document.getElementById('fillFix').style.width = fW + '%';
        document.getElementById('fillFlexSegment').style.width = Math.min((mFl/tV)*100, 100-fW) + '%';
        document.getElementById('fillFlexSegment').style.left = fW + '%';
        document.getElementById('fillBranded').style.width = Math.min((mB/tC)*100, 100) + '%';

        const dLegend = document.getElementById('deptLegend');
        dLegend.innerHTML = '';
        Object.keys(deptTotals).forEach(d => {
            if(deptTotals[d] > 0) {
                dLegend.innerHTML += `<div class="dept-legend-item" style="color:${DEPT_CFG[d].color}"><div class="dot" style="background:${DEPT_CFG[d].color}"></div>${d}: ${deptTotals[d]}</div>`;
            }
        });

        const groups = {};
        filteredSales.sort((a,b) => b.date.localeCompare(a.date)).forEach(s => {
            if(!groups[s.date]) groups[s.date] = { items: [], fix: 0, flx: 0, cal: 0 };
            groups[s.date].items.push(s);
            groups[s.date].fix += s.qtyFix; groups[s.date].flx += s.qtyFlex; groups[s.date].cal += s.qtyCal;
        });

        if (filteredSales.length === 0) {
            log.innerHTML = `<div style="text-align:center; padding:40px; color:#444; font-size:11px; letter-spacing:1px;">GEEN RESULTATEN</div>`;
            return;
        }

        Object.keys(groups).forEach((date, idx) => {
            const g = groups[date];
            const isCollapsed = collapsedDates[date] === undefined ? (idx !== 0 && searchQ === "") : collapsedDates[date];
            const dLabel = `${date.split('-')[2]} ${months[parseInt(date.split('-')[1])-1].substring(0,3)}`;

            let html = `
                <div class="date-header" onclick="toggleGroup('${date}')" style="margin-top:10px;">
                    <div style="display:flex; width:100%; justify-content:space-between; align-items:center;">
                        <div class="skew-content" style="font-size:13px; font-weight:900; color:var(--text-gray);">${dLabel}</div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div class="service-grid" style="width:100px;">
                                <div class="service-box"><span class="s-val" style="color:var(--mm-red)">${g.fix}</span></div>
                                <div class="service-box"><span class="s-val" style="color:var(--mm-orange)">${g.flx}</span></div>
                                <div class="service-box"><span class="s-val" style="color:var(--color-wait)">${g.cal}</span></div>
                            </div>
                            <span class="material-icons" style="color:#444; font-size:18px;">${isCollapsed ? 'expand_more' : 'expand_less'}</span>
                        </div>
                    </div>
                </div>
                <div style="display:${isCollapsed ? 'none' : 'block'}; padding: 0 4px;">
            `;

            g.items.forEach(s => {
                const depts = s.dept.map(d => `<span class="dept-tag tag-${d}"><span class="material-icons" style="font-size:9px;">${DEPT_CFG[d].icon}</span>${d}</span>`).join('');
                html += `
                    <div class="log-item">
                        <div style="display:grid; grid-template-columns: 1fr 90px 35px; align-items:center; gap:8px;">
                            <div style="overflow:hidden;">
                                <div class="skew-content" style="font-size:12px; color:#fff; white-space:nowrap; text-overflow:ellipsis;">${s.invoice}</div>
                                <div style="display:flex; gap:4px; flex-wrap:wrap;">${depts}</div>
                                ${s.notes ? `<div style="font-size:9px; color:#555; font-style:italic; margin-top:2px; text-transform:none;">${s.notes}</div>` : ''}
                            </div>
                            <div class="service-grid">
                                <div class="service-box"><span class="s-val" style="color:var(--mm-red)">${s.qtyFix}</span></div>
                                <div class="service-box"><span class="s-val" style="color:var(--mm-orange)">${s.qtyFlex}</span></div>
                                <div class="service-box"><span class="s-val" style="color:var(--color-wait)">${s.qtyCal}</span></div>
                            </div>
                            <div style="display:flex; justify-content:flex-end;">
                                <span class="material-icons" style="color:#444; font-size:18px;" onclick="startEdit(${s.id})">edit</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            log.innerHTML += html + `</div>`;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault();
        const data = {
            id: editId || Date.now(),
            invoice: document.getElementById('invoice').value,
            dept: selectedDepts.length > 0 ? [...selectedDepts] : ['MDA'],
            notes: document.getElementById('notes').value,
            qtyFix: parseInt(document.getElementById('qtyFix').value)||0,
            qtyFlex: parseInt(document.getElementById('qtyFlex').value)||0,
            qtyCal: parseInt(document.getElementById('qtyCal').value)||0,
            date: document.getElementById('dateInput').value
        };
        if(editId) sales = sales.map(s => s.id === editId ? data : s);
        else sales.push(data);
        resetForm(); render();
    };

    function resetForm() {
        editId = null; 
        const btn = document.getElementById('submitBtn');
        btn.style.background = 'var(--btn-save)';
        document.getElementById('btnIcon').innerText = 'save';
        document.getElementById('btnText').innerText = 'SAVE';
        document.getElementById('saleForm').reset();
        selectedDepts = []; document.querySelectorAll('.dept-chip').forEach(c => c.classList.remove('active'));
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
    }

    function startEdit(id) {
        const s = sales.find(x => x.id === id);
        editId = id; 
        const btn = document.getElementById('submitBtn');
        btn.style.background = 'var(--btn-update)';
        document.getElementById('btnIcon').innerText = 'update';
        document.getElementById('btnText').innerText = 'UPDATE';
        document.getElementById('invoice').value = s.invoice;
        document.getElementById('notes').value = s.notes || '';
        document.getElementById('qtyFix').value = s.qtyFix; 
        document.getElementById('qtyFlex').value = s.qtyFlex; 
        document.getElementById('qtyCal').value = s.qtyCal;
        document.getElementById('dateInput').value = s.date;
        selectedDepts = [...s.dept];
        document.querySelectorAll('.dept-chip').forEach(chip => {
            chip.classList.toggle('active', s.dept.includes(chip.getAttribute('data-dept')));
        });
        window.scrollTo(0,0);
    }

    async function shareAsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selM = parseInt(document.getElementById('viewMonth').value);
        const selY = parseInt(document.getElementById('viewYear').value);
        const filtered = sales.filter(s => { const d = new Date(s.date); return d.getMonth() === selM && d.getFullYear() === selY; }).sort((a,b) => a.date.localeCompare(b.date));
        doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(255, 51, 51); doc.setFontSize(22); doc.text("S&S TRACKER", 15, 25);
        const rows = filtered.map(s => [s.date, s.invoice, s.dept.join(', '), s.qtyFix, s.qtyFlex, s.qtyCal, s.notes || '']);
        doc.autoTable({ startY: 40, head: [['DATUM', 'INV', 'DEPT', 'FIX', 'FLX', 'CAL', 'NOTES']], body: rows, theme: 'plain', styles: { fillColor: [0, 0, 0], textColor: [255, 255, 255], fontSize: 8 } });
        doc.save(`SS_Report_${months[selM]}.pdf`);
    }

    function manualExport() {
        const csv = sales.map(s => `${s.id},${s.date},"${s.invoice}",${s.qtyFix},${s.qtyFlex},${s.qtyCal},"${s.notes}","${s.dept.join('|')}"`).join("\n");
        const blob = new Blob(["\ufeffid,date,invoice,qtyFix,qtyFlex,qtyCal,notes,dept\n"+csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='SS_Backup.csv'; a.click();
    }

    function manualImport(event) {
        const file = event.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(f) {
            const lines = f.target.result.split('\n');
            const imported = [];
            lines.forEach((line, i) => {
                if(i===0 || !line.trim()) return;
                const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(c.length >= 6) {
                    imported.push({ id: parseInt(c[0]) || Date.now()+i, date: c[1].trim(), invoice: c[2].replace(/"/g,'').trim(), qtyFix: parseInt(c[3]) || 0, qtyFlex: parseInt(c[4]) || 0, qtyCal: parseInt(c[5]) || 0, notes: c[6] ? c[6].replace(/"/g,'').trim() : '', dept: (c[7]) ? c[7].replace(/"/g,'').split('|') : ['MDA'] });
                }
            });
            sales = imported; render();
        };
        reader.readAsText(file);
    }

    function saveTargets() { localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value); localStorage.setItem('ss_t_b_c', document.getElementById('targetCal').value); render(); }

    window.onload = function() {
        const mS = document.getElementById('viewMonth'), yS = document.getElementById('viewYear'), n = new Date();
        months.forEach((m, i) => mS.innerHTML += `<option value="${i}" ${i === n.getMonth() ? 'selected' : ''}>${m}</option>`);
        [n.getFullYear(), n.getFullYear()-1].forEach(y => yS.innerHTML += `<option value="${y}" ${y === n.getFullYear() ? 'selected' : ''}>${y}</option>`);
        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 40;
        document.getElementById('targetCal').value = localStorage.getItem('ss_t_b_c') || 10;
        document.getElementById('dateInput').value = n.toISOString().split('T')[0];
        render();
    };
</script>
</body>
</html>
