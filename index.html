<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>S&S Tracker V274-THEME-FILTERS</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%23ff3333%22 font-family=%22Arial%22>S</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --mm-red: #ff3333; --mm-orange: #ff8800;
            --bg: #000; --card-bg: #161616; --text-dark: #fff; --text-gray: #999;
            --color-wait: #4db8ff; --color-future: #00ff88; --color-done: #444;
            --mm-font: 'Arial Black', sans-serif;
            --h-unit: 38px;
            --skew-deg: -10deg;
            --unskew-deg: 10deg;
        }
        
        * { box-sizing: border-box; }
        .symbol { font-family: 'Material Symbols Rounded'; font-weight: normal; font-size: 18px; display: inline-block; line-height: 1; font-style: normal; }
        body { font-family: var(--mm-font); font-weight: 900; font-style: italic; background: var(--bg); margin: 0; padding-bottom: env(safe-area-inset-bottom); color: var(--text-dark); text-transform: uppercase; overflow-x: hidden; }
        .container { padding: 0 8px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 12px; margin-top: 10px; border: 1px solid #222; position: relative; }
        .inner-txt { transform: skewX(var(--unskew-deg)); display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 6px; }

        .main-header { 
            background: #0a0a0a; border: 1px solid #333; height: var(--h-unit);
            display: flex; align-items: center; justify-content: center; font-size: 11px; 
            letter-spacing: 1px; color: var(--text-gray); margin-bottom: 12px;
            transform: skewX(var(--skew-deg)); border-radius: 6px;
        }
        .main-header span { color: var(--mm-red); margin-left: 4px; }

        .input-skew { 
            height: var(--h-unit); border: 1px solid #333; background: #111; color: #fff; 
            font-family: inherit; font-style: italic; font-weight: 900; font-size: 10px;
            text-transform: uppercase; width: 100%; transform: skewX(var(--skew-deg));
            border-radius: 6px; outline: none; padding: 0; display: flex;
        }
        .input-skew input, .input-skew select {
            background: transparent; border: none; color: inherit; font-family: inherit;
            font-style: inherit; font-weight: inherit; font-size: inherit; width: 100%;
            height: 100%; text-align: center; transform: skewX(var(--unskew-deg));
            outline: none; text-transform: uppercase;
        }
        /* Style for options inside dropdown */
        select option { background: #161616; color: #fff; text-transform: uppercase; }
        
        .btn-action-slim { 
            cursor: pointer; color: var(--text-gray); border: 1px solid #333; background: #111;
            transform: skewX(var(--skew-deg)); border-radius: 6px; height: var(--h-unit);
            display: flex; align-items: center; justify-content: center;
            font-family: inherit; font-style: italic; font-weight: 900; text-transform: uppercase; font-size: 9px;
        }
        .btn-action-slim.submit-style { border-color: #333; color: var(--color-future); background: #111; font-size: 11px; }
        .btn-action-slim.active-wait { color: var(--color-wait); border-color: var(--color-wait); }
        .btn-action-slim.active-eye { color: var(--color-future); border-color: var(--color-future); }

        .qty-control-skew { 
            display: grid; grid-template-columns: 25px 1fr 25px; background: #111; 
            border: 1px solid #333; height: var(--h-unit); transform: skewX(var(--skew-deg));
            border-radius: 6px; overflow: hidden;
        }
        .qty-btn-skew { background: #222; border: none; color: var(--text-gray); cursor: pointer; font-weight: 900; font-size: 14px; transform: skewX(var(--unskew-deg)); }
        .qty-input-skew { background: transparent; border: none; text-align: center; font-family: inherit; font-weight: 900; font-size: 11px; transform: skewX(var(--unskew-deg)); width: 100%; outline: none; }
        
        /* Placeholder Color Fixes */
        #qtyFix::placeholder { color: var(--mm-red); opacity: 0.7; }
        #qtyFlex::placeholder { color: var(--mm-orange); opacity: 0.7; }
        #qtyCal::placeholder { color: var(--color-wait); opacity: 0.7; }

        .progress-bar-wrapper { flex: 1; height: 34px; background: #0a0a0a; border-radius: 6px; overflow: hidden; border: 1px solid #222; position: relative; display: flex; align-items: center; transform: skewX(var(--skew-deg)); }
        .fill-segment { height: 100%; transition: width 0.8s ease; position: absolute; top: 0; }
        #fillFix { background: linear-gradient(90deg, #660000, var(--mm-red)); z-index: 2; }
        #fillFlexSegment { background: linear-gradient(90deg, #663300, var(--mm-orange)); z-index: 1; }
        #fillBranded { background: linear-gradient(90deg, #004466, var(--color-wait)); }

        .bar-label-left { position: absolute; left: 12px; z-index: 5; font-size: 9px; color: #fff; transform: skewX(var(--unskew-deg)); pointer-events: none; }
        .bar-label-right { position: absolute; right: 12px; z-index: 5; font-size: 9px; color: #fff; transform: skewX(var(--unskew-deg)); pointer-events: none; }
        
        #salesLog { flex: 1; overflow-y: auto; margin: 8px 0; max-height: 500px; }
        .log-item { 
            background: #0c0c0c; border-radius: 12px; padding: 10px; margin-bottom: 8px; 
            border: 1px solid #222; position: relative; 
            border-left: 4px solid #333; border-right: 4px solid #333;
        }
        .log-grid { display: grid; grid-template-columns: 45px 1fr 115px 45px; align-items: center; gap: 6px; }
        .qty-pill { background: #000; padding: 4px 6px; border-radius: 6px; display: flex; justify-content: space-between; border: 1px solid #1a1a1a; gap: 4px; }
        
        .grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; margin-bottom: 8px; }
        .col-6 { grid-column: span 6; } .col-4 { grid-column: span 4; } .col-3 { grid-column: span 3; } .col-2 { grid-column: span 2; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="main-header"><div class="inner-txt">SERVICES & SOLUTIONS <span>TRACKER</span></div></div>
        
        <div class="grid-12" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
            <div class="progress-bar-wrapper">
                <div class="bar-label-left">INSURANCE</div>
                <div class="bar-label-right">FIX:<b id="valFix">0</b> FLX:<b id="valFlex">0</b> | <span id="percVerz">0%</span></div>
                <div id="fillFix" class="fill-segment" style="width:0%;"></div>
                <div id="fillFlexSegment" class="fill-segment" style="width:0%;"></div>
            </div>
            <div style="width: 60px; height: 34px; border: 1px solid #222; background: #0a0a0a; transform: skewX(var(--skew-deg)); border-radius: 6px;">
                <input type="number" id="targetVerz" oninput="saveTargets()" style="width:100%;height:100%;background:transparent;border:none;color:#fff;text-align:center;font-family:inherit;transform:skewX(var(--unskew-deg));">
            </div>
        </div>

        <div class="grid-12" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
            <div class="progress-bar-wrapper">
                <div class="bar-label-left">CALIBRATION</div>
                <div class="bar-label-right">CAL:<b id="valCal">0</b> | <span id="percBranded">0%</span></div>
                <div id="fillBranded" class="fill-segment" style="width:0%;"></div>
            </div>
            <div style="width: 60px; height: 34px; border: 1px solid #222; background: #0a0a0a; transform: skewX(var(--skew-deg)); border-radius: 6px;">
                <input type="number" id="targetVerzCalibration" oninput="saveTargets()" style="width:100%;height:100%;background:transparent;border:none;color:#fff;text-align:center;font-family:inherit;transform:skewX(var(--unskew-deg));">
            </div>
        </div>

        <div class="grid-12" style="margin-top:10px; margin-bottom:0;">
            <div class="btn-action-slim col-3" onclick="shareAsPDF()"><div class="inner-txt"><span class="symbol" style="font-size:14px;">share</span>SHARE</div></div>
            <div class="btn-action-slim col-3" onclick="manualExport()"><div class="inner-txt"><span class="symbol" style="font-size:14px;">download</span>EXP</div></div>
            <div class="btn-action-slim col-3" onclick="document.getElementById('importInput').click()"><div class="inner-txt"><span class="symbol" style="font-size:14px;">upload</span>IMP</div></div>
            <div class="btn-action-slim col-3" onclick="if(confirm('DELETE ALL?')){localStorage.clear();location.reload();}"><div class="inner-txt"><span class="symbol" style="font-size:14px;">delete_forever</span>CLR</div></div>
        </div>
        <input type="file" id="importInput" style="display:none" accept=".json,.csv" onchange="manualImport(event)">
    </div>

    <div class="card">
        <form id="saleForm">
            <div class="grid-12">
                <div class="input-skew col-6"><input type="text" id="invoice" inputmode="numeric" placeholder="INVOICE #" required style="text-align:left; padding-left:15px;"></div>
                <div class="input-skew col-6"><input type="text" id="notes" placeholder="NOTE..." style="text-align:left; padding-left:15px;"></div>
            </div>
            <div class="grid-12">
                <div class="qty-control-skew col-4"><button type="button" class="qty-btn-skew" onclick="adj('qtyFix',-1)">-</button><input type="number" id="qtyFix" class="qty-input-skew" placeholder="FIX" style="color:var(--mm-red)"><button type="button" class="qty-btn-skew" onclick="adj('qtyFix',1)">+</button></div>
                <div class="qty-control-skew col-4"><button type="button" class="qty-btn-skew" onclick="adj('qtyFlex',-1)">-</button><input type="number" id="qtyFlex" class="qty-input-skew" placeholder="FLX" style="color:var(--mm-orange)"><button type="button" class="qty-btn-skew" onclick="adj('qtyFlex',1)">+</button></div>
                <div class="qty-control-skew col-4"><button type="button" class="qty-btn-skew" onclick="adj('qtyCal',-1)">-</button><input type="number" id="qtyCal" class="qty-input-skew" placeholder="CAL" style="color:var(--color-wait)"><button type="button" class="qty-btn-skew" onclick="adj('qtyCal',1)">+</button></div>
            </div>
            <div class="grid-12">
                <div class="input-skew col-4"><input type="date" id="dateInput" required style="color:var(--text-gray)"></div>
                <div id="waitBtn" class="btn-action-slim col-4" onclick="toggleDateViaBox()"><div class="inner-txt"><span id="waitIcon" class="symbol">hourglass_empty</span>WAIT</div><input type="checkbox" id="dateUnknown" style="display:none" onchange="toggleDate(this)"></div>
                <button type="submit" id="mainSubmitBtn" class="btn-action-slim submit-style col-4"><div class="inner-txt"><span id="submitIcon" class="symbol">save</span>SAVE</div></button>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="grid-12">
            <div class="input-skew col-6"><input type="text" id="searchInput" placeholder="SEARCH..." oninput="render()" style="text-align:left; padding-left:15px;"></div>
            <div class="input-skew col-2"><select id="viewMonth" onchange="render()"></select></div>
            <div class="input-skew col-2"><select id="viewYear" onchange="render()"></select></div>
            <div id="eyeBtn" class="btn-action-slim col-2" onclick="toggleRunningFilter()"><div class="inner-txt"><span id="eyeIcon" class="symbol">visibility_off</span></div></div>
        </div>
        <div id="salesLog"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SS_DATA_V184';
    let sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editId = null;
    let showOnlyOpen = false;
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function getLocalDate() { return new Date().toISOString().split('T')[0]; }
    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }
    function toggleDateViaBox() { const cb = document.getElementById('dateUnknown'); cb.checked = !cb.checked; toggleDate(cb); }
    function toggleDate(cb) {
        const di = document.getElementById('dateInput'), btn = document.getElementById('waitBtn'), icon = document.getElementById('waitIcon');
        if(cb.checked) { btn.classList.add('active-wait'); icon.innerText = "hourglass_full"; di.disabled = true; di.closest('.input-skew').style.opacity = "0.2"; } 
        else { btn.classList.remove('active-wait'); icon.innerText = "hourglass_empty"; di.disabled = false; di.closest('.input-skew').style.opacity = "1"; }
    }
    
    function toggleRunningFilter() { 
        showOnlyOpen = !showOnlyOpen; 
        document.getElementById('eyeBtn').classList.toggle('active-eye', showOnlyOpen); 
        document.getElementById('eyeIcon').innerText = showOnlyOpen ? 'visibility' : 'visibility_off'; 
        render(); 
    }

    function render() {
        const log = document.getElementById('salesLog'), selM = parseInt(document.getElementById('viewMonth').value), selY = parseInt(document.getElementById('viewYear').value), search = document.getElementById('searchInput').value.toLowerCase();
        const today = getLocalDate();
        let mFx=0, mFl=0, mB=0; log.innerHTML = '';

        sales.forEach(s => { 
            if(!s.isWait && s.date !== "2099-12-31") {
                const d = new Date(s.date);
                if(d.getMonth() === selM && d.getFullYear() === selY) {
                    mFx += parseInt(s.qtyFix)||0; mFl += parseInt(s.qtyFlex)||0; mB += parseInt(s.qtyCal)||0; 
                }
            }
        });
        
        const tV = parseInt(document.getElementById('targetVerz').value) || 1, tB = parseInt(document.getElementById('targetVerzCalibration').value) || 1;
        document.getElementById('valFix').innerText = mFx; document.getElementById('valFlex').innerText = mFl; document.getElementById('valCal').innerText = mB;

        const fixP = Math.min((mFx/tV)*100, 100);
        const flexP = Math.min((mFl/tV)*100, 100 - fixP);
        document.getElementById('fillFix').style.width = fixP + '%';
        document.getElementById('fillFlexSegment').style.width = flexP + '%';
        document.getElementById('fillFlexSegment').style.left = fixP + '%';
        document.getElementById('fillBranded').style.width = Math.min((mB/tB)*100, 100) + '%';
        document.getElementById('percVerz').innerText = Math.round(((mFx+mFl)/tV)*100) + '%';
        document.getElementById('percBranded').innerText = Math.round((mB/tB)*100) + '%';

        sales.sort((a,b) => b.date.localeCompare(a.date)).forEach(s => {
            const isWait = s.isWait || s.date === "2099-12-31";
            const isFuture = s.date > today && !isWait;
            const isCompleted = !isWait && s.date <= today;
            if (showOnlyOpen && isCompleted) return;
            const inTime = isWait || (new Date(s.date).getMonth() === selM && new Date(s.date).getFullYear() === selY);
            if (!inTime && !showOnlyOpen) return; 
            if (search && !s.invoice.toLowerCase().includes(search) && !(s.notes && s.notes.toLowerCase().includes(search))) return;
            let statusColor = "var(--color-done)"; 
            if (isWait) statusColor = "var(--color-wait)"; 
            else if (isFuture) statusColor = "var(--color-future)"; 
            const dP = s.date.split('-');
            const shortD = isWait ? '---' : `${dP[2]}\n${months[parseInt(dP[1])-1]}`;
            log.innerHTML += `
            <div class="log-item" style="border-left-color:${statusColor}; border-right-color:${statusColor};">
                <div class="log-grid">
                    <div style="font-size:9px; color:var(--text-gray); text-align:center; line-height:1.1;">${shortD}</div>
                    <div style="font-size:11px; font-weight:900;">${s.invoice}</div>
                    <div class="qty-pill">
                        <div style="font-size:8px;text-align:center"><span style="color:#555;display:block">FIX</span><span style="color:var(--mm-red)">${s.qtyFix}</span></div>
                        <div style="font-size:8px;text-align:center"><span style="color:#555;display:block">FLX</span><span style="color:var(--mm-orange)">${s.qtyFlex}</span></div>
                        <div style="font-size:8px;text-align:center"><span style="color:#555;display:block">CAL</span><span style="color:var(--color-wait)">${s.qtyCal}</span></div>
                    </div>
                    <div style="display:flex; gap:6px; justify-content:flex-end;">
                        <span class="symbol" style="font-size:18px; color:var(--text-gray); cursor:pointer;" onclick="startEdit(${s.id})">edit</span>
                        <span class="symbol" style="font-size:18px; color:#444; cursor:pointer;" onclick="confirmDelete(${s.id})">delete</span>
                    </div>
                </div>
                ${s.notes ? `<div style="color:var(--mm-orange); font-size:9px; margin-top:4px; padding-left:51px; opacity:0.8; font-style:italic;">${s.notes}</div>` : ''}
            </div>`;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault();
        const wait = document.getElementById('dateUnknown').checked;
        const data = { 
            invoice: document.getElementById('invoice').value, notes: document.getElementById('notes').value, 
            qtyFix: parseInt(document.getElementById('qtyFix').value)||0, qtyFlex: parseInt(document.getElementById('qtyFlex').value)||0, 
            qtyCal: parseInt(document.getElementById('qtyCal').value)||0, date: wait ? "2099-12-31" : document.getElementById('dateInput').value, isWait: wait 
        };
        if(editId) {
            const idx = sales.findIndex(x => x.id === editId);
            sales[idx] = { ...sales[idx], ...data };
            editId = null;
            document.getElementById('mainSubmitBtn').innerHTML = '<div class="inner-txt"><span id="submitIcon" class="symbol">save</span>SAVE</div>';
        } else { sales.push({ id: Date.now(), ...data }); }
        this.reset(); document.getElementById('dateInput').value = getLocalDate(); toggleDate(document.getElementById('dateUnknown')); render();
    };

    function startEdit(id) {
        const s = sales.find(x => x.id === id); if(!s) return;
        editId = id;
        document.getElementById('invoice').value = s.invoice;
        document.getElementById('notes').value = s.notes || '';
        document.getElementById('qtyFix').value = s.qtyFix;
        document.getElementById('qtyFlex').value = s.qtyFlex;
        document.getElementById('qtyCal').value = s.qtyCal;
        document.getElementById('dateInput').value = s.isWait ? getLocalDate() : s.date;
        document.getElementById('dateUnknown').checked = s.isWait;
        toggleDate(document.getElementById('dateUnknown'));
        document.getElementById('mainSubmitBtn').innerHTML = '<div class="inner-txt"><span id="submitIcon" class="symbol">edit</span>UPDATE</div>';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveTargets() {
        localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value);
        localStorage.setItem('ss_t_b_c', document.getElementById('targetVerzCalibration').value);
        render();
    }

    function manualExport() {
        const headers = ["id", "date", "invoice", "qtyFix", "qtyFlex", "qtyCal", "notes", "isWait"];
        const rows = sales.map(s => [s.id, s.date, `"${s.invoice}"`, s.qtyFix, s.qtyFlex, s.qtyCal, `"${s.notes || ''}"`, s.isWait].join(","));
        const csvContent = [headers.join(","), ...rows].join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const dl = document.createElement('a'); dl.href = url; dl.download = `ss_backup.csv`; dl.click();
    }

    function manualImport(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) { try { sales = JSON.parse(ev.target.result); render(); } catch(e) { } };
        reader.readAsText(file);
    }

    function confirmDelete(id) { if(confirm('DELETE RECORD?')) { sales = sales.filter(x => x.id !== id); render(); } }

    window.onload = function() {
        const mS = document.getElementById('viewMonth'), yS = document.getElementById('viewYear'), n = new Date();
        months.forEach((m, i) => mS.innerHTML += `<option value="${i}" ${i === n.getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`);
        [n.getFullYear(), n.getFullYear()-1].forEach(y => yS.innerHTML += `<option value="${y}" ${y === n.getFullYear() ? 'selected' : ''}>${y}</option>`);
        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 40;
        document.getElementById('targetVerzCalibration').value = localStorage.getItem('ss_t_b_c') || 10;
        document.getElementById('dateInput').value = getLocalDate();
        render();
    };

    async function shareAsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selM = parseInt(document.getElementById('viewMonth').value);
        const selY = parseInt(document.getElementById('viewYear').value);
        const fileName = `SS_Report_${months[selM].toUpperCase()}_${selY}.pdf`;
        
        const filtered = sales.filter(s => {
            if(s.isWait || s.date === "2099-12-31") return false;
            const d = new Date(s.date);
            return d.getMonth() === selM && d.getFullYear() === selY;
        }).sort((a,b) => a.date.localeCompare(b.date));

        const totalFix = filtered.reduce((a,b) => a + (parseInt(b.qtyFix)||0), 0);
        const totalFlex = filtered.reduce((a,b) => a + (parseInt(b.qtyFlex)||0), 0);
        const totalCal = filtered.reduce((a,b) => a + (parseInt(b.qtyCal)||0), 0);

        doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 51, 51); doc.setFont("helvetica", "bold"); doc.setFontSize(22);
        doc.text("SERVICES & SOLUTIONS", 15, 20);
        doc.setTextColor(255, 255, 255); doc.setFontSize(12);
        doc.text(`REPORT: ${months[selM].toUpperCase()} ${selY}`, 15, 30);

        doc.setTextColor(0, 0, 0); doc.setFontSize(14);
        doc.text("MONTHLY TOTALS", 15, 55);
        doc.setDrawColor(200, 200, 200); doc.line(15, 58, 195, 58);
        
        doc.setFontSize(11);
        doc.setTextColor(255, 51, 51); doc.text(`FIX: ${totalFix}`, 15, 68);
        doc.setTextColor(255, 136, 0); doc.text(`FLEX: ${totalFlex}`, 60, 68);
        doc.setTextColor(77, 184, 255); doc.text(`CALIBRATION: ${totalCal}`, 105, 68);

        const tableBody = filtered.map(s => [s.date, s.invoice, s.qtyFix, s.qtyFlex, s.qtyCal, s.notes || '']);
        doc.autoTable({
            startY: 75,
            head: [['DATE', 'INVOICE', 'FIX', 'FLX', 'CAL', 'NOTES']],
            body: tableBody,
            headStyles: { fillColor: [22, 22, 22], textColor: [255, 255, 255] },
            alternateRowStyles: { fillColor: [245, 245, 245] },
            margin: { left: 15, right: 15 }
        });

        const pdfBlob = doc.output('blob');
        const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'S&S Tracker Report',
                    text: `Services & Solutions report for ${months[selM]} ${selY}`
                });
            } catch (err) {
                if(err.name !== "AbortError") doc.save(fileName);
            }
        } else {
            doc.save(fileName);
        }
    }
</script>
</body>
</html>
