<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>S&S Tracker V242-MOD</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22%23ff3333%22 font-family=%22Arial%22>S</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --mm-red: #ff3333; --mm-orange: #ff8800;
            --bg: #000; --card-bg: #161616; --text-dark: #fff; --text-gray: #999;
            --color-wait: #4db8ff; --color-future: #00ff88; --mm-font: 'Arial Black', sans-serif;
            --h-unit: 44px;
        }
        
        .symbol { font-family: 'Material Symbols Rounded'; font-weight: normal; font-size: 24px; display: inline-block; line-height: 1; font-style: normal; }
        body { font-family: var(--mm-font); font-weight: 900; font-style: italic; background: var(--bg); margin: 0; padding-bottom: env(safe-area-inset-bottom); color: var(--text-dark); text-transform: uppercase; overflow-x: hidden; }
        .container { padding: 0 8px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 12px; margin-top: 10px; border: 1px solid #222; }
        .logo-card { text-align: center; padding: 10px; border-bottom: 2px solid var(--mm-red); }
        .logo-card .title-main { color: var(--mm-red); font-size: 1.2rem; }
        
        .target-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; margin-bottom: 6px; color: var(--text-gray); }
        .target-input-clean { background: #000; border: 1px solid #333; color: var(--text-gray); width: 50px; height: 22px; border-radius: 4px; text-align: center; font-family: inherit; font-size: 11px; font-style: italic; }
        .progress-bar { width: 100%; height: 16px; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #333; position: relative; }
        .fill { height: 100%; transition: width 0.4s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; box-sizing: border-box; }
        .perc-text { font-size: 0.65rem; color: #fff; text-shadow: 1px 1px 2px #000; }

        input, select { width: 100%; height: var(--h-unit); border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-family: inherit; font-style: italic; font-weight: 900; padding: 0 10px; box-sizing: border-box; font-size: 12px; }
        
        #dateInput, #viewMonth, #viewYear { color: var(--text-gray); }
        
        #qtyFix::placeholder { color: var(--mm-red); opacity: 0.8; }
        #qtyFlex::placeholder { color: var(--mm-orange); opacity: 0.8; }
        #qtyCal::placeholder { color: var(--color-wait); opacity: 0.8; }
        
        .qty-control { display: flex; background: #111; border-radius: 8px; border: 1px solid #333; height: var(--h-unit); overflow: hidden; }
        .qty-btn { background: #222; border: none; color: #fff; width: 30px; cursor: pointer; font-weight: 900; }
        .qty-control input { flex: 1; border: none; background: transparent; text-align: center; padding: 0; color: #fff; }

        .save-btn { background: var(--mm-red); color: #fff; border: none; height: var(--h-unit); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: inherit; font-weight: 900; font-style: italic; font-size: 0.8rem; gap: 6px; width: 100%; }
        
        .list-card { display: flex; flex-direction: column; flex: 1; max-height: 520px; margin-bottom: 15px; }
        #salesLog { flex: 1; overflow-y: auto; margin: 8px 0; }
        
        .log-item { background: #0c0c0c; border-radius: 12px; padding: 10px; margin-bottom: 8px; border-left: 4px solid #333; border-right: 4px solid #333; }
        .log-item.status-wait { border-left-color: var(--color-wait); border-right-color: var(--color-wait); } 
        .log-item.status-future { border-left-color: var(--color-future); border-right-color: var(--color-future); }
        
        .log-grid { display: grid; grid-template-columns: 45px 1fr 75px 55px; align-items: center; gap: 8px; }
        .log-date { font-size: 0.7rem; color: var(--text-gray); }
        .log-invoice { font-size: 0.85rem; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .qty-pill { background: #000; padding: 2px 4px; border-radius: 6px; border: 1px solid #1a1a1a; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; text-align: center; font-size: 0.75rem; }
        .action-icons { display: flex; gap: 6px; justify-content: flex-end; color: var(--text-gray); }
        .action-icons .symbol { cursor: pointer; font-size: 20px; }
        
        .note-text { color: var(--mm-orange); font-size: 0.65rem; margin-top: 4px; padding-left: 53px; text-transform: uppercase; border-top: 1px solid #1a1a1a; padding-top: 4px; }

        .btn-action-slim { 
            height: 36px; border-radius: 8px; border: 1px solid #333; background: #111; 
            color: var(--text-gray); font-size: 0.55rem; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; gap: 6px; 
        }
        .btn-action-slim .symbol { font-size: 16px; color: var(--text-gray); }

        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 25px; font-size: 0.75rem; z-index: 2000; display: none; font-weight: bold; text-align: center; }
        #datePickerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        
        .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
        .filter-group { display: flex; gap: 6px; flex-grow: 1; }
        .eye-toggle { cursor: pointer; transition: color 0.3s; color: var(--text-gray); padding: 4px; }
        .eye-toggle.active { color: var(--color-wait); }
    </style>
</head>
<body>

<div id="toast">MELDING</div>

<div class="container">
    <div class="card logo-card"><span class="title-main">SERVICES & SOLUTIONS TRACKER</span></div>

    <div class="card">
        <div class="target-row">
            <div style="display:flex; gap:8px;">
                <span>DOEL VZK</span>
                <span style="color:var(--mm-red)">FIX:<b id="valFix">0</b></span>
                <span style="color:var(--mm-orange)">FLX:<b id="valFlex">0</b></span>
            </div>
            <input type="number" id="targetVerz" class="target-input-clean" oninput="saveTargets()">
        </div>
        <div class="progress-bar"><div id="fillVerz" class="fill" style="background:var(--mm-red); width:0%;"><span class="perc-text" id="percVerz">0%</span></div></div>
        
        <div class="target-row" style="margin-top:12px;">
            <div>DOEL BS <span style="color:var(--color-wait)">BS:<b id="valCal">0</b></span></div>
            <input type="number" id="targetBranded" class="target-input-clean" oninput="saveTargets()">
        </div>
        <div class="progress-bar"><div id="fillBranded" class="fill" style="background:var(--color-wait); width:0%;"><span class="perc-text" id="percBranded">0%</span></div></div>

        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; margin-top:12px;">
            <div class="btn-action-slim" onclick="shareAsPDF()"><span class="symbol">share</span>DEEL</div>
            <div class="btn-action-slim" onclick="manualExport()"><span class="symbol">output</span>EXP</div>
            <div class="btn-action-slim" onclick="document.getElementById('importInput').click()"><span class="symbol">input</span>IMP</div>
            <div class="btn-action-slim" onclick="if(confirm('ALLES WISSEN?')){localStorage.clear();location.reload();}" style="color:var(--mm-red);"><span class="symbol" style="color:var(--mm-red);">delete</span>CLR</div>
        </div>
    </div>

    <div class="card">
        <form id="saleForm">
            <div style="display:flex; gap:6px; margin-bottom:8px;">
                <input type="text" id="invoice" inputmode="numeric" placeholder="FACTUUR #" required style="flex:1;">
                <input type="text" id="notes" placeholder="NOTITIE..." style="flex:1;">
            </div>
            
            <div style="display:flex; gap:6px; margin-bottom:8px;">
                <div class="qty-control" style="flex:1;"><button type="button" class="qty-btn" onclick="adj('qtyFix',-1)">-</button><input type="number" id="qtyFix" placeholder="FIX"><button type="button" class="qty-btn" onclick="adj('qtyFix',1)">+</button></div>
                <div class="qty-control" style="flex:1;"><button type="button" class="qty-btn" onclick="adj('qtyFlex',-1)">-</button><input type="number" id="qtyFlex" placeholder="FLX"><button type="button" class="qty-btn" onclick="adj('qtyFlex',1)">+</button></div>
                <div class="qty-control" style="flex:1;"><button type="button" class="qty-btn" onclick="adj('qtyCal',-1)">-</button><input type="number" id="qtyCal" placeholder="BS"><button type="button" class="qty-btn" onclick="adj('qtyCal',1)">+</button></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 100px 100px; gap:6px; align-items:center;">
                <input type="date" id="dateInput" style="padding:0 8px;" required>
                
                <div id="waitBtn" style="height:var(--h-unit); border: 1px solid #333; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:#111;" onclick="toggleDateViaBox()">
                    <span style="font-size:0.65rem; color:var(--text-gray);">WACHT</span>
                    <input type="checkbox" id="dateUnknown" style="display:none" onchange="toggleDate(this)">
                </div>

                <button type="submit" id="mainSubmitBtn" class="save-btn">OPSLAAN <span class="symbol">send</span></button>
            </div>
        </form>
    </div>

    <div class="card list-card">
        <div class="list-header">
            <div class="filter-group">
                <select id="viewMonth" onchange="render()" style="height:34px; flex:2;"></select>
                <select id="viewYear" onchange="render()" style="height:34px; flex:1;"></select>
            </div>
            <span id="eyeBtn" class="symbol eye-toggle" onclick="toggleRunningFilter()" title="LOPENDE ORDERS">visibility_off</span>
        </div>

        <div style="position:relative; margin-bottom:8px;">
            <span class="symbol" style="position:absolute; left:10px; top:12px; font-size:18px; color:var(--text-gray);">search</span>
            <input type="text" id="searchInput" placeholder="ZOEK FACTUUR OF NOTITIE..." oninput="render()" style="height:44px; background:#000; border-color:#222; padding-left:35px;">
        </div>

        <div id="salesLog"></div>
        <input type="file" id="importInput" style="display:none" accept=".csv, text/csv, text/plain, .txt" onchange="manualImport(event)">
    </div>
</div>

<div id="datePickerModal">
    <div style="background:#161616; padding:20px; border-radius:16px; border:1px solid #333; width:80%; max-width:300px;">
        <label style="color:var(--mm-red); display:block; margin-bottom:10px; font-style:italic;">VOLTOOI DATUM</label>
        <input type="date" id="modalDateInput" style="margin-bottom:15px; color:var(--text-gray);">
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('datePickerModal').style.display='none'" style="flex:1; background:#333; color:#fff; border:none; height:40px; border-radius:8px; font-family:inherit;">STOP</button>
            <button onclick="confirmQuickDate()" style="flex:1; background:var(--color-future); color:#000; border:none; height:40px; border-radius:8px; font-family:inherit;">OK</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SS_DATA_V184';
    let sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editId = null;
    let showOnlyRunning = false;
    const months = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];

    function getLocalDate() { return new Date().toISOString().split('T')[0]; }
    function showToast(text) { const t = document.getElementById('toast'); t.innerText = text; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 3500); }
    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }

    function toggleDateViaBox() { const cb = document.getElementById('dateUnknown'); cb.checked = !cb.checked; toggleDate(cb); }
    function toggleDate(cb) {
        const di = document.getElementById('dateInput'), box = document.getElementById('waitBtn');
        if(cb.checked) { box.style.borderColor = "var(--color-wait)"; di.disabled = true; di.style.opacity = "0.2"; } 
        else { box.style.borderColor = "#333"; di.disabled = false; di.style.opacity = "1"; di.value = getLocalDate(); }
    }

    function toggleRunningFilter() {
        showOnlyRunning = !showOnlyRunning;
        const btn = document.getElementById('eyeBtn');
        btn.innerText = showOnlyRunning ? 'visibility' : 'visibility_off';
        btn.classList.toggle('active', showOnlyRunning);
        render();
    }

    function render() {
        const log = document.getElementById('salesLog'), 
              selM = parseInt(document.getElementById('viewMonth').value), 
              selY = parseInt(document.getElementById('viewYear').value),
              search = document.getElementById('searchInput').value.toLowerCase();
        
        let mFx=0, mFl=0, mB=0; log.innerHTML = '';
        const today = getLocalDate();

        sales.forEach(s => { 
            if(!s.isWait && s.date !== "2099-12-31") {
                const d = new Date(s.date);
                if(d.getMonth() === selM && d.getFullYear() === selY) {
                    mFx += parseInt(s.qtyFix)||0; mFl += parseInt(s.qtyFlex)||0; mB += parseInt(s.qtyCal)||0; 
                }
            }
        });
        
        document.getElementById('valFix').innerText = mFx; 
        document.getElementById('valFlex').innerText = mFl; 
        document.getElementById('valCal').innerText = mB;
        
        const tV = parseInt(document.getElementById('targetVerz').value) || 1, tB = parseInt(document.getElementById('targetBranded').value) || 1;
        document.getElementById('fillVerz').style.width = Math.min(((mFx+mFl)/tV)*100, 100) + '%';
        document.getElementById('fillBranded').style.width = Math.min((mB/tB)*100, 100) + '%';
        document.getElementById('percVerz').innerText = Math.round(((mFx+mFl)/tV)*100) + '%';
        document.getElementById('percBranded').innerText = Math.round((mB/tB)*100) + '%';

        sales.sort((a,b) => b.date.localeCompare(a.date)).forEach(s => {
            const isWait = s.isWait || s.date === "2099-12-31";
            const isFuture = !isWait && s.date > today;
            const d = new Date(s.date);
            
            const inSelectedTime = isWait || (d.getMonth() === selM && d.getFullYear() === selY);
            if (!inSelectedTime) return;
            if (showOnlyRunning && !isWait && !isFuture) return;
            
            const matchesSearch = s.invoice.toLowerCase().includes(search) || (s.notes && s.notes.toLowerCase().includes(search));
            if (!matchesSearch) return;

            const statusClass = isWait ? 'status-wait' : (isFuture ? 'status-future' : '');
            log.innerHTML += `
            <div class="log-item ${statusClass}">
                <div class="log-grid">
                    <div class="log-date" onclick="${isWait?`openQuickDate(${s.id})`:''}">
                        ${isWait?'<span class="symbol" style="color:var(--color-wait); font-size:20px;">calendar_today</span>':s.date.split('-').reverse().slice(0,2).join('/')}
                    </div>
                    <div class="log-invoice" onclick="navigator.clipboard.writeText('${s.invoice}');showToast('GEKOPIEERD')">${s.invoice}</div>
                    <div class="qty-pill">
                        <span style="color:var(--mm-red)">${s.qtyFix}</span>
                        <span style="color:var(--mm-orange)">${s.qtyFlex}</span>
                        <span style="color:var(--color-wait)">${s.qtyCal}</span>
                    </div>
                    <div class="action-icons">
                        <span class="symbol" onclick="startEdit(${s.id})">edit</span>
                        <span class="symbol" onclick="confirmDelete(${s.id})">delete</span>
                    </div>
                </div>
                ${s.notes ? `<div class="note-text">${s.notes}</div>` : ''}
            </div>`;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    function startEdit(id) {
        const s = sales.find(x => x.id === id);
        if(!s) return;
        editId = id;
        document.getElementById('invoice').value = s.invoice;
        document.getElementById('notes').value = s.notes || '';
        document.getElementById('qtyFix').value = s.qtyFix;
        document.getElementById('qtyFlex').value = s.qtyFlex;
        document.getElementById('qtyCal').value = s.qtyCal;
        const isWait = s.isWait || s.date === "2099-12-31";
        document.getElementById('dateUnknown').checked = isWait;
        toggleDate(document.getElementById('dateUnknown'));
        if(!isWait) document.getElementById('dateInput').value = s.date;
        document.getElementById('mainSubmitBtn').innerHTML = 'UPDATE <span class="symbol">edit</span>';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function confirmDelete(id) { if(confirm('ORDER VERWIJDEREN?')) { sales = sales.filter(x => x.id !== id); render(); } }
    function openQuickDate(id) { editId = id; document.getElementById('modalDateInput').value = getLocalDate(); document.getElementById('datePickerModal').style.display = 'flex'; }
    function confirmQuickDate() {
        const s = sales.find(x => x.id === editId);
        if(s) { s.date = document.getElementById('modalDateInput').value; s.isWait = false; }
        editId = null; document.getElementById('datePickerModal').style.display = 'none'; render();
    }

    function manualExport() {
        let csv = "Datum;Factuur;Fix;Flex;BS;Notitie\n";
        sales.filter(s => s.invoice).forEach(s => { 
            csv += `${s.date};${s.invoice};${s.qtyFix||0};${s.qtyFlex||0};${s.qtyCal||0};${(s.notes||'').replace(/;/g, ',')}\n`; 
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `SS_Backup.csv`; a.click();
    }

    function manualImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const text = e.target.result;
                const rows = text.split(/\r?\n/);
                let added = 0, skipped = 0;
                rows.forEach((row, i) => {
                    if(i === 0 || !row.trim()) return;
                    const sep = row.includes(';') ? ';' : ',';
                    const cols = row.split(sep);
                    if(cols.length >= 4) {
                        const inv = cols[1]?.trim();
                        if(!inv) return;
                        if(!sales.some(s => s.invoice === inv)) {
                            const dateVal = cols[0].trim();
                            sales.push({ id: Date.now() + Math.random(), date: dateVal, invoice: inv, qtyFix: cols[2]?.trim()||'0', qtyFlex: cols[3]?.trim()||'0', qtyCal: cols[4]?.trim()||'0', notes: cols[5]?.trim()||'', isWait: dateVal === "2099-12-31" });
                            added++;
                        } else { skipped++; }
                    }
                });
                render();
                showToast(`IMPORT KLAAR\n\nNieuw: ${added}\nDuplicaten: ${skipped}`);
            } catch (err) { showToast("FOUT: BESTAND NIET LEESBAAR"); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    async function shareAsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const selM = parseInt(document.getElementById('viewMonth').value);
        const selY = parseInt(document.getElementById('viewYear').value);
        const monthLabel = months[selM];
        
        let filtered = sales.filter(s => !s.isWait && s.date !== "2099-12-31" && new Date(s.date).getMonth() === selM && new Date(s.date).getFullYear() === selY);
        filtered.sort((a,b) => a.date.localeCompare(b.date));

        // Totalen berekenen
        let tFix = 0, tFlx = 0, tCal = 0;
        filtered.forEach(s => {
            tFix += parseInt(s.qtyFix)||0;
            tFlx += parseInt(s.qtyFlex)||0;
            tCal += parseInt(s.qtyCal)||0;
        });

        const body = filtered.map(s => [
            s.date.split('-').reverse().join('-'),
            s.invoice,
            { content: s.qtyFix, styles: { textColor: [255, 51, 51] } },
            { content: s.qtyFlex, styles: { textColor: [255, 136, 0] } },
            { content: s.qtyCal, styles: { textColor: [77, 184, 255] } },
            s.notes || ''
        ]);

        // THEMA STYLING (DONKER)
        doc.setFillColor(22, 22, 22); // --card-bg
        doc.rect(0, 0, 210, 297, 'F');

        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.setTextColor(255, 51, 51); // --mm-red
        doc.text(`SERVICES & SOLUTIONS RAPPORT`, 14, 20);
        
        doc.setFontSize(10);
        doc.setTextColor(153, 153, 153); // --text-gray
        doc.text(`PERIODE: ${monthLabel} ${selY}`, 14, 28);

        // HOOFDTABEL
        doc.autoTable({
            startY: 35,
            head: [['DATUM', 'FACTUUR', 'FIX', 'FLX', 'BS', 'NOTITIE']],
            body: body,
            theme: 'grid',
            headStyles: {
                fillColor: [40, 40, 40],
                textColor: [255, 255, 255],
                fontStyle: 'bold',
                lineWidth: 0.1,
                lineColor: [60, 60, 60]
            },
            bodyStyles: {
                fillColor: [30, 30, 30],
                textColor: [200, 200, 200],
                fontSize: 9,
                lineColor: [50, 50, 50]
            },
            alternateRowStyles: {
                fillColor: [25, 25, 25]
            },
            columnStyles: {
                0: { cellWidth: 25 },
                1: { cellWidth: 40 },
                2: { halign: 'center', cellWidth: 15 },
                3: { halign: 'center', cellWidth: 15 },
                4: { halign: 'center', cellWidth: 15 }
            }
        });

        // TOTALEN TABEL
        const finalY = doc.lastAutoTable.finalY + 10;
        doc.autoTable({
            startY: finalY,
            head: [['OVERZICHT TOTALEN', 'AANTAL']],
            body: [
                ['TOTAAL FIX', { content: tFix, styles: { textColor: [255, 51, 51], fontStyle: 'bold' } }],
                ['TOTAAL FLEX', { content: tFlx, styles: { textColor: [255, 136, 0], fontStyle: 'bold' } }],
                ['TOTAAL BS', { content: tCal, styles: { textColor: [77, 184, 255], fontStyle: 'bold' } }],
                ['TOTAAL ALGEMEEN', { content: tFix + tFlx + tCal, styles: { textColor: [255, 255, 255], fontStyle: 'bold' } }]
            ],
            theme: 'grid',
            styles: {
                fillColor: [35, 35, 35],
                textColor: [150, 150, 150],
                fontSize: 10,
                lineColor: [60, 60, 60]
            },
            headStyles: {
                fillColor: [255, 51, 51],
                textColor: [255, 255, 255]
            },
            columnStyles: {
                1: { halign: 'right', cellWidth: 30 }
            },
            margin: { left: 120 } // Rechts uitlijnen
        });

        const pdfBlob = doc.output('blob');
        const fileName = `SS_Rapport_${monthLabel}_${selY}.pdf`;
        const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: `S&S Rapport ${monthLabel}` }); } catch (err) { doc.save(fileName); }
        } else {
            doc.save(fileName);
            showToast("PDF GEDOWNLOAD");
        }
    }

    function saveTargets() {
        localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value);
        localStorage.setItem('ss_t_b', document.getElementById('targetBranded').value);
        render();
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault();
        const inv = document.getElementById('invoice').value;
        if(sales.some(s => s.invoice === inv && s.id !== editId)) { alert("DIT FACTUURNUMMER BESTAAT AL!"); return; }
        const wait = document.getElementById('dateUnknown').checked;
        const data = { id: editId || Date.now(), invoice: inv, notes: document.getElementById('notes').value, qtyFix: document.getElementById('qtyFix').value||0, qtyFlex: document.getElementById('qtyFlex').value||0, qtyCal: document.getElementById('qtyCal').value||0, date: wait ? "2099-12-31" : document.getElementById('dateInput').value, isWait: wait };
        if(editId) { sales = sales.map(x => x.id === editId ? data : x); editId = null; document.getElementById('mainSubmitBtn').innerHTML = 'OPSLAAN <span class="symbol">send</span>'; }
        else { sales.push(data); }
        this.reset();
        document.getElementById('dateInput').value = getLocalDate();
        toggleDate(document.getElementById('dateUnknown'));
        render();
        showToast("ORDER OPGESLAGEN");
    };

    window.onload = function() {
        const mS = document.getElementById('viewMonth'), yS = document.getElementById('viewYear'), n = new Date();
        months.forEach((m, i) => { mS.innerHTML += `<option value="${i}" ${i === n.getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`; });
        [n.getFullYear(), n.getFullYear()-1].forEach(y => { yS.innerHTML += `<option value="${y}" ${y === n.getFullYear() ? 'selected' : ''}>${y}</option>`; });
        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 40;
        document.getElementById('targetBranded').value = localStorage.getItem('ss_t_b') || 10;
        document.getElementById('dateInput').value = getLocalDate();
        render();
    };
</script>
</body>
</html>
