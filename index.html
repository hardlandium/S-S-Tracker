<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S&S Tracker V226</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --mm-red: #ff3333; --mm-orange: #ff8800;
            --bg: #000; --card-bg: #161616; --text-dark: #fff; --text-gray: #999;
            --color-cal: #4db8ff; --color-ok: #00ff88; --mm-font: 'Arial Black', sans-serif;
            --h-unit: 44px;
            --ph-red: #661414; --ph-orange: #663a00; --ph-blue: #143a52;
        }
        
        .symbol { 
            font-family: 'Material Symbols Rounded';
            font-weight: normal; font-style: normal; font-size: 24px;
            display: inline-block; line-height: 1; text-transform: none;
            letter-spacing: normal; word-wrap: normal; white-space: nowrap; direction: ltr;
        }

        body { font-family: var(--mm-font); font-weight: 900; font-style: italic; background: var(--bg); margin: 0; padding-bottom: env(safe-area-inset-bottom); color: var(--text-dark); text-transform: uppercase; overflow-x: hidden; }
        .container { padding: 0 8px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 12px; margin-top: 10px; border: 1px solid #222; }
        .logo-card { text-align: center; padding: 10px; border-bottom: 2px solid var(--mm-red); margin-bottom: 0; }
        .logo-card .title-main { color: var(--mm-red); font-size: 1.2rem; line-height: 1; letter-spacing: -1px; display: block; }
        
        .target-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; margin-bottom: 6px; color: var(--text-gray); }
        .target-label-data { display: flex; gap: 10px; align-items: center; }
        .data-segment { display: flex; align-items: center; gap: 4px; }
        .data-segment b { color: #fff; font-size: 0.8rem; }
        .target-input-clean { background: #000; border: 1px solid #333; color: var(--text-gray); width: 50px; height: 22px; border-radius: 4px; text-align: center; font-family: inherit; font-weight: 900; font-size: 11px; }
        .progress-bar { width: 100%; height: 16px; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #333; position: relative; }
        .fill { height: 100%; transition: width 0.4s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; box-sizing: border-box; }
        .perc-text { font-size: 0.65rem; color: #fff; text-shadow: 1px 1px 2px #000; }

        input, select { width: 100%; height: var(--h-unit); border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-family: inherit; font-weight: 900; font-style: italic; padding: 0 10px; box-sizing: border-box; font-size: 12px; }
        ::placeholder { color: var(--text-gray); opacity: 1; }

        #qtyFix::placeholder { color: var(--ph-red); }
        #qtyFlex::placeholder { color: var(--ph-orange); }
        #qtyCal::placeholder { color: var(--ph-blue); }

        .qty-control { display: flex; background: #111; border-radius: 8px; border: 1px solid #333; height: var(--h-unit); overflow: hidden; }
        .qty-btn { background: #222; border: none; color: #fff; width: 32px; font-weight: 900; cursor: pointer; }
        .qty-control input { flex: 1; border: none; background: transparent; text-align: center; font-size: 0.95rem; height: 100%; padding: 0; min-width: 0; }
        
        .input-sub-label { font-size: 0.5rem; color: var(--text-gray); margin-bottom: 4px; display: block; letter-spacing: 0.5px; }
        .input-row-bottom { display: flex; gap: 8px; align-items: flex-end; }
        .date-unknown-box { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; height: var(--h-unit); background: #000; border-radius: 8px; border: 2px solid #333; cursor: pointer; box-sizing: border-box; }
        .date-unknown-box span { font-size: 0.6rem; letter-spacing: 1px; color: var(--text-gray); }
        .date-unknown-box.active { border-color: var(--color-cal); background: #001524; }
        .date-unknown-box.active span { color: var(--color-cal); }

        .save-btn { background: var(--mm-red); color: #fff; border: none; flex: 1; height: var(--h-unit); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: inherit; font-weight: 900; font-style: italic; font-size: 0.8rem; gap: 6px; box-sizing: border-box; }
        .save-btn:active { opacity: 0.7; }

        .search-container { position: relative; margin-top: 8px; margin-bottom: 4px; }
        .search-container .symbol { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 18px; pointer-events: none; }
        .search-container input { padding-left: 35px; background: #000; border-color: #222; height: 38px; }

        .list-card { display: flex; flex-direction: column; flex: 1; max-height: 480px; margin-bottom: 15px; }
        #salesLog { flex: 1; overflow-y: auto; margin: 8px 0; }
        
        .log-item { background: #0c0c0c; border-radius: 12px; padding: 10px; margin-bottom: 8px; border-left: 4px solid #333; border-right: 4px solid #333; }
        .log-item.status-wait { border-left-color: var(--color-cal); border-right-color: var(--color-cal); } 
        .log-item.status-open { border-left-color: var(--color-ok); border-right-color: var(--color-ok); }   
        .log-item.status-done { opacity: 0.6; border-left-color: #333; border-right-color: #333; } 

        .log-main-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .log-left-data { display: flex; align-items: center; gap: 10px; flex: 1; overflow: hidden; }
        .log-date-col { width: 42px; flex-shrink: 0; display: flex; align-items: center; cursor: pointer; }
        .log-date-text { color: var(--text-gray); font-size: 0.75rem; }
        .log-invoice { font-size: 0.9rem; color: #fff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .qty-pill { background: #000; padding: 2px 6px; border-radius: 6px; border: 1px solid #1a1a1a; display: grid; grid-template-columns: repeat(3, 20px); gap: 4px; text-align: center; font-size: 0.8rem; flex-shrink: 0; }
        
        .action-icons { display: flex; gap: 10px; align-items: center; color: var(--text-gray); }
        .action-icons .symbol { cursor: pointer; font-size: 20px; }
        .note-text { color: var(--mm-orange); font-size: 0.65rem; padding-left: 52px; margin-top: 2px; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 8px; }
        .btn-action { height: 54px; border-radius: 12px; border: 1px solid #333; background: #111; color: var(--text-dark); font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 4px; }
        .btn-action .symbol { font-size: 24px; color: var(--text-gray); }
        
        #datePickerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 6px 12px; border-radius: 20px; font-size: 0.6rem; z-index: 2000; display: none; }
    </style>
</head>
<body>

<div id="toast">GEKOPIEERD</div>

<div class="container">
    <div class="card logo-card"><span class="title-main">SERVICES & SOLUTIONS TRACKER</span></div>

    <div class="card">
        <div class="target-row">
            <div class="target-label-data">
                <span>DOEL VZK</span>
                <div class="data-segment"><span style="color:var(--mm-red)">FIX:</span><b id="valFix">0</b></div>
                <div class="data-segment"><span style="color:var(--mm-orange)">FLX:</span><b id="valFlex">0</b></div>
            </div>
            <input type="number" id="targetVerz" class="target-input-clean" oninput="saveTargets()">
        </div>
        <div class="progress-bar"><div id="fillVerz" class="fill" style="background:var(--mm-red); width:0%;"><span class="perc-text" id="percVerz">0%</span></div></div>
        
        <div class="target-row" style="margin-top:12px;">
            <div class="target-label-data">
                <span>DOEL BS</span>
                <div class="data-segment"><span style="color:var(--color-cal)">BS:</span><b id="valCal">0</b></div>
            </div>
            <input type="number" id="targetBranded" class="target-input-clean" oninput="saveTargets()">
        </div>
        <div class="progress-bar"><div id="fillBranded" class="fill" style="background:var(--color-cal); width:0%;"><span class="perc-text" id="percBranded">0%</span></div></div>
    </div>

    <div class="card">
        <form id="saleForm">
            <div style="display:flex; gap:6px; margin-bottom:10px;">
                <div style="flex:1;"><input type="text" id="invoice" inputmode="numeric" placeholder="FACTUUR #" required></div>
                <div style="flex:1;"><input type="text" id="notes" placeholder="NOTITIE..."></div>
            </div>
            <div style="display:flex; gap:6px; margin-bottom:10px;">
                <div style="flex:1;"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyFix',-1)">-</button><input type="number" id="qtyFix" placeholder="FIX"><button type="button" class="qty-btn" onclick="adj('qtyFix',1)">+</button></div></div>
                <div style="flex:1;"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyFlex',-1)">-</button><input type="number" id="qtyFlex" placeholder="FLX"><button type="button" class="qty-btn" onclick="adj('qtyFlex',1)">+</button></div></div>
                <div style="flex:1;"><div class="qty-control"><button type="button" class="qty-btn" onclick="adj('qtyCal',-1)">-</button><input type="number" id="qtyCal" placeholder="BS"><button type="button" class="qty-btn" onclick="adj('qtyCal',1)">+</button></div></div>
            </div>
            
            <div class="input-row-bottom">
                <div style="flex:2;">
                    <span id="dateLabel" class="input-sub-label">VOLTOOIINGSDATUM</span>
                    <input type="date" id="dateInput" required>
                </div>
                <div id="waitBtn" class="date-unknown-box" onclick="toggleDateViaBox()">
                    <span>WACHT</span>
                    <input type="checkbox" id="dateUnknown" style="display:none" onchange="toggleDate(this)">
                </div>
                <button type="submit" id="mainSubmitBtn" class="save-btn">OPSLAAN <span class="symbol" style="font-size:18px;">send</span></button>
            </div>
        </form>
    </div>

    <div class="card list-card">
        <div style="display:flex; gap:6px; margin-bottom:5px; align-items:center; flex-shrink:0;">
            <select id="viewMonth" onchange="render()" style="flex:2; height:34px;"></select>
            <select id="viewYear" onchange="render()" style="flex:1; height:34px;"></select>
            <div onclick="onlyOpen = !onlyOpen; render();" style="width:34px; text-align:center; cursor:pointer;"><span class="symbol" id="eyeIcon">visibility</span></div>
        </div>
        <div id="salesLog"></div>
        
        <div class="search-container">
            <span class="symbol">search</span>
            <input type="text" id="searchInput" placeholder="ZOEK FACTUUR OF NOTITIE..." oninput="render()">
        </div>

        <div class="action-grid">
            <div class="btn-action" onclick="shareAsPDF()"><span class="symbol">share</span>DEEL</div>
            <div class="btn-action" onclick="manualExport()"><span class="symbol">output</span>EXP</div>
            <div class="btn-action" onclick="document.getElementById('importInput').click()"><span class="symbol">input</span>IMP</div>
            <div class="btn-action" onclick="if(confirm('WEET JE HET ZEKER? ALLE DATA WORDT GEWIST!')){localStorage.clear();location.reload();}" style="color:var(--mm-red);"><span class="symbol">delete_forever</span>CLR</div>
        </div>
        <input type="file" id="importInput" style="display:none" accept=".csv" onchange="manualImport(event)">
    </div>
</div>

<div id="datePickerModal">
    <div style="background:#161616; padding:20px; border-radius:16px; border:1px solid #333; width:80%; max-width:300px; text-align:center;">
        <label style="color:var(--mm-red); margin-bottom:10px; display:block;">STATUS WIJZIGEN</label>
        <input type="date" id="modalDateInput" style="margin-bottom:15px;">
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('datePickerModal').style.display='none'" style="flex:1; background:#333; color:#fff; border:none; height:40px; border-radius:8px;">STOP</button>
            <button onclick="confirmDateChange()" style="flex:1; background:var(--color-ok); color:#000; border:none; height:40px; border-radius:8px;">OK</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SS_DATA_V184';
    let sales = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editId = null, onlyOpen = false;
    const months = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];

    function getLocalDate() { return new Date().toISOString().split('T')[0]; }
    function showToast(text) { const t = document.getElementById('toast'); t.innerText = text; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 1500); }
    function adj(id, v) { const el = document.getElementById(id); el.value = Math.max(0, (parseInt(el.value) || 0) + v); }
    
    function toggleDateViaBox() { 
        const cb = document.getElementById('dateUnknown'); 
        cb.checked = !cb.checked; 
        toggleDate(cb); 
    }

    function toggleDate(cb) {
        const di = document.getElementById('dateInput'), box = document.getElementById('waitBtn'), label = document.getElementById('dateLabel');
        if(cb.checked) { box.classList.add('active'); di.style.opacity = "0.2"; label.style.opacity = "0.2"; di.disabled = true; } 
        else { box.classList.remove('active'); di.style.opacity = "1"; label.style.opacity = "1"; di.disabled = false; di.value = getLocalDate(); }
    }

    function saveTargets() {
        localStorage.setItem('ss_t_v', document.getElementById('targetVerz').value);
        localStorage.setItem('ss_t_b', document.getElementById('targetBranded').value);
        render();
    }

    function openQuickDate(id) {
        editId = id;
        const s = sales.find(x => x.id === id);
        document.getElementById('modalDateInput').value = s.isWait ? getLocalDate() : s.date;
        document.getElementById('datePickerModal').style.display = 'flex';
    }

    function startEdit(id) {
        const s = sales.find(x => x.id === id);
        if(!s) return;
        editId = id;
        document.getElementById('invoice').value = s.invoice;
        document.getElementById('notes').value = s.notes;
        document.getElementById('qtyFix').value = s.qtyFix;
        document.getElementById('qtyFlex').value = s.qtyFlex;
        document.getElementById('qtyCal').value = s.qtyCal;
        document.getElementById('dateUnknown').checked = s.isWait;
        toggleDate(document.getElementById('dateUnknown'));
        if(!s.isWait) document.getElementById('dateInput').value = s.date;
        document.getElementById('mainSubmitBtn').innerHTML = `UPDATE <span class="symbol">sync</span>`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function confirmDelete(id) {
        const s = sales.find(x => x.id === id);
        if(confirm(`ORDER ${s.invoice} VERWIJDEREN?`)) {
            sales = sales.filter(x => x.id !== id);
            render();
        }
    }

    async function shareAsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selM = parseInt(document.getElementById('viewMonth').value), selY = parseInt(document.getElementById('viewYear').value);
        const tV = parseInt(document.getElementById('targetVerz').value) || 0;
        const tB = parseInt(document.getElementById('targetBranded').value) || 0;
        let filtered = sales.filter(s => !s.isWait && new Date(s.date).getMonth() === selM && new Date(s.date).getFullYear() === selY);
        let mFx=0, mFl=0, mB=0;
        const rows = filtered.sort((a,b) => a.date.localeCompare(b.date)).map(s => {
            mFx += (parseInt(s.qtyFix)||0); mFl += (parseInt(s.qtyFlex)||0); mB += (parseInt(s.qtyCal)||0);
            return [s.date.split('-').reverse().join('/'), s.invoice, s.qtyFix||0, s.qtyFlex||0, s.qtyCal||0, s.notes||''];
        });
        const pV = tV > 0 ? Math.round(((mFx + mFl) / tV) * 100) : 0, pB = tB > 0 ? Math.round((mB / tB) * 100) : 0;
        doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 297, 'F');
        doc.setFont("helvetica", "bolditalic"); doc.setFontSize(22); doc.setTextColor(255, 51, 51); doc.text(`S&S RAPPORT`, 14, 20);
        doc.setFontSize(14); doc.setTextColor(153, 153, 153); doc.text(`${months[selM].toUpperCase()} ${selY}`, 14, 28);
        doc.setFontSize(11); doc.setTextColor(255, 51, 51); doc.text(`VZK VOORTGANG: ${mFx + mFl} / ${tV} (${pV}%)`, 14, 40);
        doc.setTextColor(77, 184, 255); doc.text(`BS VOORTGANG: ${mB} / ${tB} (${pB}%)`, 14, 47);
        doc.autoTable({ 
            startY: 55, head: [['DATUM', 'FACTUUR', 'FIX', 'FLEX', 'BS', 'NOTITIE']], body: rows, foot: [['', 'TOTALEN', mFx, mFl, mB, '']], theme: 'grid', 
            styles: { fillColor: [22, 22, 22], textColor: [255, 255, 255], lineColor: [40, 40, 40], font: 'helvetica', fontStyle: 'bolditalic' },
            headStyles: { fillColor: [255, 51, 51], textColor: [255, 255, 255] },
            footStyles: { fillColor: [0, 0, 0], textColor: [255, 255, 255] },
            alternateRowStyles: { fillColor: [15, 15, 15] }
        });
        const fileName = `SS-Rapport-${months[selM]}-${selY}.pdf`, pdfBlob = doc.output('blob');
        if (navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], fileName, { type: 'application/pdf' })] })) {
            try { await navigator.share({ files: [new File([pdfBlob], fileName, { type: 'application/pdf' })], title: fileName }); } catch (err) { doc.save(fileName); }
        } else { doc.save(fileName); showToast("GEDOWNLOAD"); }
    }

    function manualExport() {
        let csv = "Datum;Factuur;Fix;Flex;BS;Notitie\n";
        sales.forEach(s => { csv += `${s.date};${s.invoice};${s.qtyFix};${s.qtyFlex};${s.qtyCal};${s.notes}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `SS_Backup_${getLocalDate()}.csv`; a.click();
    }

    function manualImport(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const rows = reader.result.split('\n').slice(1);
            rows.forEach(row => {
                const cols = row.split(';');
                if(cols.length >= 5) sales.push({ id: Date.now() + Math.random(), date: cols[0], invoice: cols[1], qtyFix: cols[2], qtyFlex: cols[3], qtyCal: cols[4], notes: cols[5]||'', isWait: cols[0] === "2099-12-31" });
            });
            render();
        };
        reader.readAsText(event.target.files[0]);
    }

    function confirmDateChange() {
        const idx = sales.findIndex(s => s.id === editId);
        if(idx !== -1) { sales[idx].date = document.getElementById('modalDateInput').value; sales[idx].isWait = false; }
        document.getElementById('datePickerModal').style.display='none'; render();
    }

    function render() {
        const log = document.getElementById('salesLog'), selM = parseInt(document.getElementById('viewMonth').value), selY = parseInt(document.getElementById('viewYear').value), search = document.getElementById('searchInput').value.toLowerCase(), todayStr = getLocalDate();
        let mFx=0, mFl=0, mB=0; log.innerHTML = '';
        sales.forEach(s => { if(!s.isWait && new Date(s.date).getMonth() === selM && new Date(s.date).getFullYear() === selY) { mFx += parseInt(s.qtyFix)||0; mFl += parseInt(s.qtyFlex)||0; mB += parseInt(s.qtyCal)||0; } });
        document.getElementById('valFix').innerText = mFx; document.getElementById('valFlex').innerText = mFl; document.getElementById('valCal').innerText = mB;
        const tV = parseInt(document.getElementById('targetVerz').value) || 1, tB = parseInt(document.getElementById('targetBranded').value) || 1;
        const pV = Math.round(((mFx + mFl) / tV) * 100), pB = Math.round((mB / tB) * 100);
        document.getElementById('percVerz').innerText = pV + '%'; document.getElementById('percBranded').innerText = pB + '%';
        document.getElementById('fillVerz').style.width = Math.min(pV, 100) + '%'; document.getElementById('fillBranded').style.width = Math.min(pB, 100) + '%';
        document.getElementById('eyeIcon').style.color = onlyOpen ? 'var(--mm-red)' : '#444';
        [...sales].sort((a,b) => (a.isWait === b.isWait) ? b.date.localeCompare(a.date) : (a.isWait ? -1 : 1)).forEach(s => {
            const isFuture = !s.isWait && s.date > todayStr, d = new Date(s.date), matchesSearch = s.invoice.toLowerCase().includes(search) || s.notes.toLowerCase().includes(search);
            const statusClass = s.isWait ? 'status-wait' : (isFuture ? 'status-open' : 'status-done');
            if (matchesSearch && (s.isWait || isFuture || (!onlyOpen && d.getMonth() === selM && d.getFullYear() === selY))) {
                log.innerHTML += `<div class="log-item ${statusClass}"><div class="log-main-row"><div class="log-left-data"><div class="log-date-col" onclick="openQuickDate(${s.id})">${s.isWait?'<span class="symbol" style="color:var(--color-cal);font-size:18px">calendar_today</span>':`<span class="log-date-text">${s.date.split('-').reverse().slice(0,2).join('/')}</span>`}</div><span class="log-invoice" onclick="navigator.clipboard.writeText('${s.invoice}');showToast('GEKOPIEERD')">${s.invoice}</span><div class="qty-pill"><span style="color:var(--mm-red)">${s.qtyFix||0}</span><span style="color:var(--mm-orange)">${s.qtyFlex||0}</span><span style="color:var(--color-cal)">${s.qtyCal||0}</span></div></div><div class="action-icons"><span class="symbol" onclick="startEdit(${s.id})">edit</span><span class="symbol" onclick="confirmDelete(${s.id})">delete</span></div></div>${s.notes ? `<div class="note-text">${s.notes}</div>` : ''}</div>`;
            }
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    }

    document.getElementById('saleForm').onsubmit = function(e) {
        e.preventDefault();
        const wait = document.getElementById('dateUnknown').checked, invNum = document.getElementById('invoice').value.trim();
        if(editId && !confirm(`WIJZIGINGEN OPSLAAN VOOR ORDER ${invNum}?`)) return;
        const data = { id: editId || Date.now(), invoice: invNum, notes: document.getElementById('notes').value.trim(), qtyFix: document.getElementById('qtyFix').value, qtyFlex: document.getElementById('qtyFlex').value, qtyCal: document.getElementById('qtyCal').value, date: wait ? "2099-12-31" : document.getElementById('dateInput').value, isWait: wait };
        if(editId) { sales = sales.map(x => x.id === editId ? data : x); editId = null; document.getElementById('mainSubmitBtn').innerHTML = `OPSLAAN <span class="symbol">send</span>`; }
        else { sales.push(data); }
        this.reset(); document.getElementById('dateInput').value = getLocalDate(); toggleDate(document.getElementById('dateUnknown')); render();
    };

    window.onload = function() {
        const mS = document.getElementById('viewMonth'), yS = document.getElementById('viewYear'), n = new Date();
        const currentYear = n.getFullYear();
        
        // Vul maanden en selecteer huidige
        months.forEach((m, i) => { mS.innerHTML += `<option value="${i}" ${i === n.getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`; });
        
        // Verzamel alle unieke jaren uit de data + huidige jaar
        let availableYears = new Set([currentYear]);
        sales.forEach(s => { if(!s.isWait) availableYears.add(new Date(s.date).getFullYear()); });
        
        // Vul jaren dropdown en selecteer huidige jaar
        [...availableYears].sort((a,b) => b-a).forEach(y => {
            yS.innerHTML += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`;
        });

        document.getElementById('targetVerz').value = localStorage.getItem('ss_t_v') || 40;
        document.getElementById('targetBranded').value = localStorage.getItem('ss_t_b') || 10;
        document.getElementById('dateInput').value = getLocalDate();
        render();
    };
</script>
</body>
</html>
